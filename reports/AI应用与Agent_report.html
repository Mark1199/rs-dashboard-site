<!-- industry-research 编辑风报告模板 · 共享底座 V2.7.2（industry/manifesto/author/techdive 共用） · 渲染由 scripts/render_report_html.py 注入
     V2.7.2（skill V2.20.2·2026-06-14）：3 渲染器抗 LLM schema 漂移（治本"data 在却空白/undefined"）——renderGeo 兼容 players[]｜value+note 双模式（无 players 走份额模式·根除 0 面积空白）；renderTrend spark 兼容 points｜series + xrange｜periods + latest 缺则取 series 末值（根除"→需补"假阴）；buildValueflow sources detail|def|note|text · pools n|name + text|detail · mainflow players[]||text · parallel detail||text（根除 undefined）。**+ `.vf-pool .pn` CSS 修复**：旧 `width:18px`（为数字徽章设计）遇 `n` 装整段中文标签时强制每字一行→垂直堆叠→box 巨高且大片空白；改 `min-width:18px;white-space:nowrap;font-size:15px`，徽章与长标签两用、单行不竖排（AI支付 实证：池 box 从 ~600px 垂直 → 48px 单行）。AI支付报告 headless 实证：geo canvas 47KB PNG 真绘 + trend 2 真 sparkline + valueflow 0 undefined + pool box 48px 单行。
     V2.7.2b（同批·geo 标的入图）：renderGeo 玩家模式升级——有 `co.value`(份额) 时按份额定国块大小、玩家均分该国块（块∝份额 ∧ 每个玩家=具名子块），无 value 退回块=玩家数；这样国别图同时给"份额"与"具体标的"（AI支付 实证：美国块最大含 Visa/MA/Circle/Coinbase… 22 标的全入图）。geo 数据应给 `players[]`(本国标的) + 可选 `value`(份额) + `note`(战略一句话·tooltip)。
     V2.7.3（techdive 真图标注模式）：renderAnatomy 加 image-mode——有 `anatomy.image.url`（websearch 真实权威配图：厂商/数据手册/论文图）时，用真图 `<img>` + 编号 callout 覆盖层(`callouts[].n/x/y`·x/y 0-100%) + 图源出处行 替代合成 SVG，与图例表 # 一一对应；治"合成解剖图画不像真物"（GB200 托盘/具体封装等）。CSS = .anat-img/.anat-co/.anat-imgsrc。零回归（无 image 走原合成分支）。audit 自动豁免合成形状反退化、改查 image.source 出处归属。
     V2.7.0：纯加法新增 renderAnatomy = 实体标注解剖图（SVG schematic 编号 callout + 图例表，供 /techdive），不动任何现有渲染器
     V2.7.1：renderAnatomy 升级为通用标注解剖图——data 驱动 + 可扩展原型库（BOARD_SHELL 外壳 ×5：pcb/stack/module/mech/die；
             PART_GLYPH 部件图元 ×12：chip/die/connector/heatsink/capacitor/coil/gear/cell/lens/port/stack-layer/rect）
             + path 逃生舱（board.path / parts[].path 给任意轮廓）+ board.view:"section" 剖面视图 + 外置 leader-line 标注。
             三重缺省回退保证老 anatomy JSON 字节级不变；其余 14 个渲染器一字未动。
     V2.7.1a：renderAnatomy 富分支加坐标制式自动识别（非剖面下任一坐标>100=绝对板内 px，否则百分比 0-100；剖面恒按比例堆叠）——
              作者用绝对或百分比两种写法都渲染正确，few-shot 绝对坐标无需改写；百分比 JSON 行为不变（零回归）。 -->
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI 应用与 Agent · 产业研究 · 编辑版</title>
<script src="https://cdn.jsdelivr.net/npm/markdown-it@14/dist/markdown-it.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
<style>
:root{
 --paper:#faf8f3; --paper2:#f3efe5; --ink:#1c1a17; --ink2:#3a352d;
 --muted:#6b655c; --faint:#a89e8c; --line:#e0d9cb; --line2:#cbbfa6;
 --ox:#8c2f23; --ox2:#a8483a; --gold:#9a7b1f; --goldbar:#c9a227;
 --serif:"Songti SC","Source Han Serif SC","Noto Serif SC","SimSun",Georgia,serif;
 --sans:"PingFang SC","Microsoft YaHei","Segoe UI",-apple-system,sans-serif;
}
*{box-sizing:border-box} html{scroll-behavior:smooth}
body{margin:0;background:var(--paper);color:var(--ink2);font-family:var(--sans);font-size:16px;line-height:1.85;-webkit-font-smoothing:antialiased}
.page{max-width:768px;margin:0 auto;padding:0 26px 120px}
/* masthead */
.masthead{padding:60px 0 30px;border-bottom:3px double var(--line2);margin-bottom:8px}
.masthead .kick{letter-spacing:.3em;font-size:11px;color:var(--ox);text-transform:uppercase;margin-bottom:18px}
.masthead h1{font-family:var(--serif);font-weight:700;font-size:52px;line-height:1.04;letter-spacing:-1px;color:var(--ink);margin:0 0 14px;max-width:9em}
.masthead .standfirst{font-family:var(--serif);font-size:19px;line-height:1.6;color:var(--ink2);max-width:30em;margin:0 0 22px}
.masthead .meta{display:flex;flex-wrap:wrap;gap:6px 22px;font-size:12.5px;color:var(--muted);border-top:1px solid var(--line);padding-top:14px}
.masthead .meta b{color:var(--ink);font-weight:600}
/* dashboard — stacked full width */
.dash{margin:34px 0 10px}
.dash .dh{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--faint);margin-bottom:6px}
.figrow{margin:30px 0;padding-top:22px;border-top:1px solid var(--line)}
.figrow:first-of-type{border-top:none}
.figrow h4{font-family:var(--serif);font-size:18px;color:var(--ink);margin:0 0 2px;font-weight:700}
.figrow .cap{font-size:12.5px;color:var(--muted);margin:0 0 12px}
.chart{width:100%}
@media(max-width:640px){.masthead h1{font-size:38px}}
/* body typography */
#content h1{font-family:var(--serif);font-weight:700;font-size:33px;line-height:1.15;color:var(--ink);margin:64px 0 6px;padding-top:26px;border-top:1px solid var(--line2);letter-spacing:-.5px}
#content h1:first-child{border-top:none;padding-top:0;margin-top:30px}
#content h2{font-family:var(--serif);font-weight:700;font-size:23px;color:var(--ink);margin:42px 0 10px}
#content h3{font-weight:700;font-size:16px;color:var(--ox);letter-spacing:.02em;margin:30px 0 8px}
#content h4{font-weight:700;font-size:14.5px;color:var(--ink2);margin:22px 0 6px}
#content p{margin:0 0 16px;text-align:justify}
#content a{color:var(--ox);text-decoration:none;border-bottom:1px solid var(--line2)}
#content strong{color:var(--ink);font-weight:700}
#content em{color:var(--ox2);font-style:normal;background:linear-gradient(transparent 60%,#f0e6cf 60%)}
#content ul,#content ol{margin:0 0 18px;padding-left:1.3em}
#content li{margin:0 0 7px}
#content ul li::marker{color:var(--ox)}
#content blockquote{margin:22px 0;padding:4px 0 4px 22px;border-left:3px solid var(--gold);font-family:var(--serif);font-size:18px;line-height:1.6;color:var(--ink);font-style:italic}
#content hr{border:none;border-top:1px solid var(--line);margin:34px 0}
#content code{font-family:"SF Mono",Menlo,monospace;font-size:.82em;background:var(--paper2);padding:1px 5px;border-radius:3px;color:var(--ox)}
#content pre{background:#221f1a;color:#e6ddc9;border-radius:6px;padding:18px 20px;overflow-x:auto;font-size:12px;line-height:1.55;margin:20px 0;box-shadow:inset 0 0 0 1px #000}
#content pre code{background:none;color:inherit;padding:0;font-size:12px}
/* tables — editorial + 防竖排 + 横向滚动 */
.tablewrap{overflow-x:auto;margin:22px 0;-webkit-overflow-scrolling:touch}
#content table{width:100%;border-collapse:collapse;margin:0;font-size:13px;line-height:1.5;table-layout:auto}
#content th,#content td{word-break:keep-all;overflow-wrap:break-word}
#content thead th{font-weight:700;color:var(--ink);text-align:left;border-bottom:2px solid var(--ink);padding:8px 10px;background:var(--paper2);white-space:nowrap}
#content tbody td{padding:7px 10px;border-bottom:1px solid var(--line);color:var(--ink2);vertical-align:top}
#content tbody td:first-child,#content thead th:first-child{white-space:nowrap;font-weight:600;color:var(--ink)}
#content tbody tr:hover{background:#f5f1e7}
/* ticker → Yahoo 链接 */
a.tk-link{color:var(--ox);border-bottom:1px dotted var(--ox2);font-family:"SF Mono",Menlo,monospace;font-size:.94em;white-space:nowrap}
a.tk-link::after{content:"↗";font-size:.7em;vertical-align:super;opacity:.6;margin-left:1px}
/* inline rendered figure */
.vizfig{margin:24px 0 30px}
.vizfig figcaption{font-family:var(--serif);font-size:13px;color:var(--muted);font-style:italic;margin:0 0 3px;padding-left:12px;border-left:3px solid var(--gold)}
/* V2.6 卖方级图表描述：结论式副标题 + 数据源脚注（全图共用 figHead/figFoot）*/
.vfig-sub{font-family:var(--serif);font-size:15.5px;line-height:1.5;color:var(--ink);font-weight:700;margin:0 0 12px;padding-left:12px}
.vfig-foot{margin-top:11px;padding-top:7px;border-top:1px dotted var(--line2);font-size:10.5px;color:var(--faint);display:flex;flex-wrap:wrap;gap:3px 18px}
.vfig-foot .vfig-hint{font-style:italic}
.vfig-foot .vfig-src{margin-left:auto}
.vchart{width:100%}
.mermaid{text-align:center;margin:22px 0}
/* editorial chain diagram */
.chain-fig{margin:4px 0 8px}
.clayer{display:grid;grid-template-columns:74px 1fr;gap:0 20px;padding:20px 0;border-top:1px solid var(--line)}
.clayer:last-child{border-bottom:1px solid var(--line)}
.clayer .num{font-family:var(--serif);font-size:50px;line-height:.82;color:var(--line2);font-weight:700}
.clayer.bn .num{color:var(--ox)} .clayer.hi .num{color:var(--gold)}
.clayer .lname{font-size:17px;font-weight:700;color:var(--ink)}
.clayer .lname .stars{color:var(--goldbar);font-size:12px;letter-spacing:1px;margin-left:9px}
.clayer .ldef{color:var(--muted);font-size:12.5px;margin:3px 0 11px;line-height:1.6}
.clayer .plist{font-size:14px;line-height:2.05;color:var(--ink2)}
.clayer .pl .sup{font-size:10px;vertical-align:super;font-weight:700;margin-right:1px}
.clayer .sep{color:var(--line2);margin:0 8px}
.clayer .tk{font-size:11px;color:var(--ox);font-weight:600;font-family:"SF Mono",monospace}
.clayer .pv{font-size:10px;color:var(--faint);border:1px solid var(--line2);border-radius:3px;padding:0 3px;margin-left:2px}
.clayer .sh{color:var(--gold);border-bottom:2px solid var(--goldbar);font-weight:700}
.clayer .note{display:block;font-size:12px;color:var(--ox);margin-top:6px;font-style:italic;font-family:var(--serif)}
.chain-legend{display:flex;flex-wrap:wrap;gap:7px 18px;font-size:11.5px;color:var(--muted);margin:8px 0 0;padding-top:12px;border-top:1px dashed var(--line2)}
.chain-legend .sup{font-size:10px;vertical-align:super;font-weight:700;margin-right:2px}
.natus{color:#8c2f23}.nateu{color:#1e7e4f}.natcn{color:#b8860b}.natres{color:#8a8a8a}.natgate{color:#6d4c9a}
/* value-flow 富渲染 */
.vf{font-family:var(--sans)}
.vf .vf-h{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--faint);margin:18px 0 8px}
.vf-src{background:var(--paper2);border-radius:8px;padding:14px 18px}
.vf-src .s{font-size:13.5px;line-height:1.7;color:var(--ink2)}
.vf-src .s b{color:var(--ink)}
.vf-conn{text-align:center;color:var(--line2);font-size:13px;margin:8px 0;letter-spacing:2px}
.vf-layer{position:relative;border:1px solid var(--line);border-left:4px solid var(--line2);border-radius:8px;padding:13px 16px;margin:10px 0;background:#fff}
.vf-layer.pool{border-left-color:var(--goldbar);background:linear-gradient(100deg,#fbf6e6,#fff 60%)}
.vf-layer.tuna{border-left-color:var(--ox)}
.vf-layer .lh{display:flex;align-items:baseline;gap:9px;flex-wrap:wrap}
.vf-layer .id{font-family:var(--serif);font-size:22px;font-weight:700;color:var(--ox);line-height:1}
.vf-layer.pool .id{color:var(--gold)}
.vf-layer .nm{font-size:15.5px;font-weight:700;color:var(--ink)}
.vf-layer .nat{font-size:11.5px;color:#fff;background:var(--muted);border-radius:10px;padding:1px 8px}
.vf-layer.pool .nat{background:var(--gold)} .vf-layer.tuna .nat{background:var(--ox)}
.vf-layer .annot{margin-left:auto;font-size:11.5px;color:var(--ox);font-style:italic;font-family:var(--serif)}
.vf-layer .pl{font-size:13px;color:var(--ink2);margin-top:7px;line-height:1.7}
.vf-layer .pl .dot{color:var(--line2);margin:0 6px}
.vf-layer .key{font-size:12px;color:var(--gold);margin-top:6px;font-weight:600}
.vf-flownote{font-size:12px;color:var(--muted);font-style:italic;text-align:center;margin:4px 0;font-family:var(--serif)}
.vf-div{display:flex;align-items:center;gap:12px;margin:22px 0 6px;color:var(--ink);font-weight:700;font-size:14px}
.vf-div::before,.vf-div::after{content:"";flex:1;height:1px;background:var(--line2)}
.vf-pools{counter-reset:pool;display:grid;gap:8px;margin-top:6px}
.vf-pool{display:flex;align-items:baseline;gap:10px;background:#fff;border:1px solid var(--line);border-radius:7px;padding:9px 14px;font-size:13.5px}
.vf-pool .pn{font-family:var(--serif);font-weight:700;color:var(--gold);font-size:15px;flex:none;min-width:18px;white-space:nowrap}
.vf-pool .pt{color:var(--ink2)} .vf-pool .pt b{color:var(--ink)}
.vf-pool .pg{margin-left:auto;color:var(--goldbar);font-size:11px;white-space:nowrap}
.vf-take{margin-top:16px;padding:14px 18px;background:#241f17;color:#f0e6cf;border-radius:8px;font-size:14px;line-height:1.7}
.vf-take b{color:#f4c95d}
/* 生命周期 × 卡脖子定位矩阵（A.2）*/
.lcm{display:grid;gap:3px;margin:8px 0 4px;font-family:var(--sans);font-size:12.5px}
.lcm .lc-corner{font-family:var(--serif);font-size:11px;color:var(--muted);padding:8px;display:flex;align-items:center;background:var(--paper2);border-radius:3px}
.lcm .lc-h{color:#fff;font-weight:700;text-align:center;padding:7px 4px;border-radius:3px;font-size:12px}
.lcm .lc-row{font-family:var(--serif);font-weight:700;color:var(--ink);padding:8px;display:flex;align-items:center;background:var(--paper2);border-radius:3px}
.lcm .lc-cell{padding:7px 6px;border-radius:3px;display:flex;flex-wrap:wrap;gap:4px;align-items:center;min-height:36px}
.lcm .lc-chip{background:#fff;border:1px solid var(--line2);border-radius:4px;padding:1px 7px;color:var(--ink2);font-size:12px;white-space:nowrap}
.lcm .lc-dash{color:var(--faint)}
/* timeline 时间线（作品/catalyst/事件）*/
.tl{position:relative;margin:6px 0 4px;padding-left:4px;border-left:2px solid var(--line2)}
.tl-it{position:relative;padding:0 0 16px 20px}
.tl-it::before{content:"";position:absolute;left:-7px;top:5px;width:9px;height:9px;border-radius:50%;background:var(--ox);border:2px solid var(--paper)}
.tl-it.up::before{background:var(--gold)}
.tl-it .d{font-family:"SF Mono",Menlo,monospace;font-size:11px;color:var(--ox);font-weight:600}
.tl-it .t{font-weight:700;color:var(--ink);font-size:14px;margin:1px 0}
.tl-it .x{color:var(--muted);font-size:12.5px;line-height:1.6}
.tl-it .tag{font-size:10px;color:#fff;background:var(--gold);border-radius:3px;padding:0 6px;margin-left:6px;vertical-align:middle}
/* scorecard 命中率卡 */
.scard{margin:6px 0 4px}
.scard .hr{display:flex;align-items:baseline;gap:10px;margin-bottom:12px}
.scard .hr .big{font-family:var(--serif);font-size:40px;font-weight:700;color:var(--ox);line-height:1}
.scard .hr .lb{font-size:13px;color:var(--muted)}
.scard .row{display:grid;grid-template-columns:22px 84px 1fr;gap:0 10px;padding:8px 0;border-top:1px solid var(--line);align-items:start;font-size:13px}
.scard .row:last-child{border-bottom:1px solid var(--line)}
.scard .ic{font-weight:700;text-align:center}
.scard .ic.hit{color:#1e7e4f}.scard .ic.miss{color:#c0392b}.scard .ic.part{color:var(--gold)}
.scard .dt{font-family:"SF Mono",Menlo,monospace;font-size:11px;color:var(--faint)}
.scard .pr b{color:var(--ink)}.scard .pr .nt{color:var(--muted);font-size:12px;display:block;margin-top:2px}
/* gauge 评分仪表 */
.gau{margin:6px 0 4px}
.gau .top{display:flex;align-items:baseline;gap:8px;margin-bottom:12px}
.gau .top .big{font-family:var(--serif);font-size:40px;font-weight:700;color:var(--gold);line-height:1}
.gau .top .mx{font-size:14px;color:var(--faint)}
.gau .top .lb{font-size:13px;color:var(--ink2);margin-left:6px}
.gau .sub{display:grid;grid-template-columns:130px 1fr 46px;gap:7px 10px;align-items:center;font-size:12.5px;margin-top:6px}
.gau .sub .nm{color:var(--ink2)}
.gau .bar{height:8px;background:var(--paper2);border-radius:4px;overflow:hidden}
.gau .bar i{display:block;height:100%;background:linear-gradient(90deg,var(--gold),var(--goldbar))}
.gau .sub .vv{color:var(--muted);font-size:11px;text-align:right}
/* cycle 双轴定位（生命周期 S 曲线 × 周期相位）*/
.cyc{margin:6px 0 4px}
.cyc-ax{margin:12px 0 6px}
.cyc-lbl{font-size:12.5px;color:var(--ink2);margin-bottom:2px}
.cyc-lbl b{color:var(--ox);font-weight:700}
.cyc svg{width:100%;height:auto;display:block;overflow:visible}
.cyc-sig{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-top:16px}
@media(max-width:560px){.cyc-sig{grid-template-columns:1fr}}
.cyc-sig .col h5{margin:0 0 5px;font-size:11.5px;font-weight:700;letter-spacing:.02em}
.cyc-sig .danger h5{color:#c0392b}.cyc-sig .safe h5{color:#1e7e4f}.cyc-sig .watch h5{color:var(--gold)}
.cyc-sig ul{margin:0;padding-left:1.05em;line-height:1.5}
.cyc-sig li{margin:0 0 4px;color:var(--ink2);font-size:12px}
.cyc-bm{margin-top:14px;padding:10px 14px;background:var(--paper2);border-radius:6px;font-size:12px;color:var(--ink2);line-height:1.6}
.cyc-bm b{color:var(--ink)}
.cyc-basis{margin-top:13px;font-size:12px;color:var(--ink2);line-height:1.6}
.cyc-basis b{color:var(--gold)}
.cyc-syn{margin-top:13px;padding:11px 15px;background:#241f17;color:#f0e6cf;border-radius:7px;font-size:13px;line-height:1.65;font-weight:600}
/* trend 强度指标时序小多图（周期证据层）*/
.tr{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:14px;margin:6px 0 4px}
.tr-cell{border:1px solid var(--line);border-radius:7px;padding:10px 12px;background:#fff}
.tr-nm{font-size:12px;font-weight:700;color:var(--ink);margin-bottom:5px;line-height:1.3}
.tr svg{width:100%;height:auto;display:block}
.tr-foot{display:flex;align-items:baseline;justify-content:space-between;margin-top:5px}
.tr-val{font-family:"SF Mono",Menlo,monospace;font-size:14px;font-weight:700;color:var(--ink)}
.tr-dir{font-size:15px;font-weight:700;line-height:1}
.tr-note{font-size:11px;color:var(--muted);margin-top:4px;line-height:1.45}
/* benchbar 当前 vs 历史泡沫阈值对标条 */
.bb{margin:6px 0 4px}
.bb-an{font-size:12px;color:var(--muted);margin-bottom:12px}
.bb-an b{color:var(--ox)}
.bb-row{display:grid;grid-template-columns:148px 1fr 150px;gap:6px 12px;align-items:center;padding:9px 0;border-top:1px solid var(--line)}
.bb-row:last-child{border-bottom:1px solid var(--line)}
.bb-nm{font-size:12.5px;color:var(--ink2);font-weight:600}
.bb-track{position:relative;height:13px;background:var(--paper2);border-radius:7px}
.bb-fill{height:100%;border-radius:7px}
.bb-thr{position:absolute;top:-4px;width:2px;height:21px;background:var(--ink);opacity:.72}
.bb-anmark{position:absolute;top:50%;width:9px;height:9px;background:var(--ox);transform:translate(-50%,-50%) rotate(45deg);border:1px solid #faf8f3}

# 〇、决策头页（5 分钟入口）

*本节给 PM 的 5 分钟决策入口：只说变化、赔率、跟踪变量、反证与缺口，不出现正文没有的新数字。*

**本期变化**：与 2025 年"AI 增强在位者、人人都涨"的共识相比，2026 年 1-2 月发生了一次结构性重定价（市场称 SaaSpocalypse）。Anthropic 推出 Claude Cowork 与自主法律/业务工作流后，软件板块在 2 月头一周蒸发逾 $1T 市值，自 1 月底累计蒸发逾 $2T，软件前瞻 P/E 跌至 22.7x，史上首次低于标普 500 整体倍数 [S8]。本研究的最大分歧不在"SaaS 会不会死"（不会），而在市场把整个篮子无差别抛售时，记录系统与薄工具的价值分叉尚未被充分定价。

| 论断 | 一句话 | 状态 | 概率（理由）|
|---|---|---|---|
| 一 | agent 把软件劈成 fortress 上行 / 薄工具压缩两半 | 当前证据一致 | 高 0.65（座席与 NRR 已现分叉信号 [S6][S8]）|
| 二 | agent 预订已起、收入确认滞后 4-8 季度 | 当前证据一致 | 中 0.60（Agentforce ARR 占 CRM 收入 <3% [S4]）|
| 三 | 当下最实的 agentic ROI 是广告引擎而非企业 copilot | 当前证据一致 | 中 0.55（APP 收入端已兑现、企业 agent 仍在 booking [S7]）|
| 四 | durable moat 在分发 + 推理基础设施 + 专有数据围栏 | hypothesis | 中 0.60（微软 E7 bundling + Action Fabric 刚落地 [S9][S19]）|

**五个跟踪变量**（与 §9 对齐）：

| 变量 | 当前值 | 危险阈值 | 数据源 |
|---|---|---|---|
| 软件板块前瞻 P/E | 22.7x（2026Q1）[S8] | <18x（二次杀估值）| IGV / FactSet 汇编 |
| CRM Agentforce ARR | >$1B（Q1 FY27）[S4] | 连续两季环比 <20% | Salesforce 8-K |
| NOW cRPO 同比 | +25%（21% cc，Q4'25）[S5] | <15% | ServiceNow 8-K |
| APP 收入增速 | +59% YoY（Q1'26）[S7] | <25% YoY | AppLovin 财报 |
| at-risk 组席位同比 | Atlassian 已首现负增长 [S8] | 三家以上转负 | 各公司财报 |

**最大反方证据**：Gartner 预计至 2027 底逾 40% 的 agentic AI 项目将因成本失控、价值不清或风控不足被取消 [S21]；当前仅 17% 企业部署 agent、79% 宣称采用但仅 11% 进入生产 [S21]。若 agent 货币化大面积证伪，论断二（滞后但终将兑现）会先倒，届时赢家的牛市估值同样需要下修。

**数据缺口声明**：(1) 行业级 agent 出货"量"无统一口径，本报告 §3.0c 用"龙头披露 agent ARR/ACV 加总"作 bottom-up 代理，覆盖约头部 5 家、并列二手市场规模交叉，属 T3 降级；(2) AppLovin e-commerce 收入为分析师估算（公司已不分项披露 vertical），C 级 [S7]；(3) 纯 agent 基础设施（eval/向量库/agent 身份）多为私有，附录 D 标"→需补"。

# 一、执行摘要

*这一节是给只有 5 分钟时间的高管看的。如果只读这一节，应该能拿到 80% 的研究价值。*

2026 年 2 月头一周，软件板块在七个交易日内蒸发逾 $1T 市值，是这一群体自 2022 年加息冲击与 2008 年金融危机以来最快的回撤之一；自 1 月底累计蒸发逾 $2T，软件前瞻 P/E 跌至 22.7x，史上首次跌破标普 500 整体倍数 [S8]。导火索并非某家公司的业绩暴雷，而是 Anthropic 推出 Claude Cowork 与一批自主法律/业务工作流后，市场第一次把"AI 不只帮人用软件、而是替代整类软件"当成可量化的现实来定价 [S8]。值得注意的是，这是一次情绪重定价而非经营崩塌：截至目前装机基础大体稳固，平均毛留存仍在 90% 以上 [S17]，股价下跌远超基本面恶化。这恰恰是产业研究的切入点：当整个篮子被无差别抛售，谁被错杀、谁被错抬，是未来三年 alpha 的来源。

**本研究跟踪的 4 个核心论断**（来自自建 + Phase 1 机构共识）：

- **论断 1**：AI agent 不会杀死 SaaS，而是把软件按"是否拥有专有工作流数据 + 系统级嵌入"劈成两半，记录系统（CRM/NOW/SAP/INTU/GWRE）靠 agent ARPU 扩张重新 re-rate 向上，参与/薄工作流系统（ASAN/MNDY/DOCU/ZM/U）面临席位压缩 → 验证位置 [§6 全 link + §8]。
- **论断 2**：agent 的预订（ARR/RPO）已经起来，但收入确认滞后 4-8 季度；当前估值对赢家已 price-in 牛市、对输家 price-in 末日 → 验证位置 [§3.0c + §6.1]。
- **论断 3**：当下被验证最充分、ROI 最硬的"AI 应用"不是企业 copilot，而是广告分配引擎（APP AXON / META Advantage+），它们已在收入端兑现 → 验证位置 [§6.2 + §5]。
- **论断 4**：app 层 agent 正被基础模型商品化，真正的 durable moat 在两端，分发渠道（微软/CRM/NOW/META 的既有触达）与推理/编排基础设施（NET Workers AI），以及专有数据围栏（Action Fabric / SAP API policy / FICO 评分）→ 验证位置 [§6.3 + §7 + 附录 D]。

四个论断之间存在清晰的先后与催化关系。论断 4（价值在两端、中间薄层被挤）是结构底座，它直接推导出论断 1 的分叉：拥有分发或专有数据的记录系统在结构上属"两端"、受益于 agent；薄工作流属被挤的"中间"、受损。论断 2 解释了为什么这场分叉在财报上还看不清，agent 收入确认滞后，导致基本面尚未印证估值已经定价的分歧，这正是错配窗口。论断 3 则是当下唯一一个"产业级 agentic ROI 已在收入端跑出来"的样本，它为整个 agent 叙事提供了存在性证明，同时也提醒：真金白银的兑现，目前发生在广告而非企业软件。

标的发现 3 层（详见 §8）：(1) 命门/数据围栏层 = FICO、GWRE、INTU、NOW（专有确定性数据，agent 无法重生成）；(2) 在位 re-rate 层 = CRM、SAP、ADBE、NICE（agent ARPU 扩张 + 估值已被错杀到低位）；(3) 期权/兑现层 = APP（广告引擎已兑现）、NET（推理基础设施期权）、PATH（RPA→agentic 转型期权）。

# 二、为什么是现在

*这一节回答"why now"。*

一个数字最能说明此刻的紧迫：Gartner 预计到 2026 年底，40% 的企业应用将内嵌任务专用 AI agent，而 2025 年这一比例还不到 5% [S1]。从不到 5% 到 40% 的一年跳跃，意味着每一个企业软件品类都将在 2026 年被迫回答同一个问题，当一个 agent 能干十个人的活，按人头收费的逻辑还成不成立。微软 CEO Nadella 已经把答案挑明：席位正在变成"对某种用量的一纸入场券"[S6]。这不是远期预言，而是正在发生的定价革命：Atlassian 在 2026 年报告了历史上第一次企业席位数下降，主因正是 AI agent 替代了原本需要专人操作 Jira/Confluence 的任务 [S8]。

这并非孤立现象。一组数据勾勒出席位经济的瓦解速度：按 Pilot 研究，纯席位制软件公司占比在 12 个月内从 21% 降到 15%，混合定价（固定底座 + 变量用量）从 27% 升到 41% [S6]；IDC 进一步预测到 2028 年纯席位制将被淘汰、70% 厂商重构定价 [S6]。定价模型重构的背后是单位经济学的断裂：传统 SaaS 服务一个用户的边际成本近乎固定，所以按人头收费成立；而 AI 时代每一次推理调用都有 token 成本，重度用户可能花掉轻度用户 10 倍的钱，一刀切定价会让最好的客户摧毁毛利 [S6]。

更值得关注的是时间窗口。三个催化在 2026 上半年同时落地。第一，分发巨头加速 bundling：微软 M365 E7 + Agent 365 于 2026 年 5 月 1 日 GA，$99/用户/月打包 E5 + Copilot + Entra Suite + Agent 365，是自 2016 年 E5 以来最大的一次许可变更，分析师直接称之为"SaaS 大整合"[S9]。第二，记录系统开始为自己的数据筑墙：ServiceNow 推出 Action Fabric，要求外部 agent 必须经此层才能访问平台数据与执行工作流；SAP 则禁止未经授权的自主 AI 调用其 API，把自家 Joule 放在许可一侧 [S19]。第三，广告侧的 agentic 引擎跑出了第一个产业级 ROI 样本：AppLovin 的 AXON 在 2026 年 6 月首次对公众开放自助投放，把 14 年来只服务直客的引擎向 e-commerce 全面铺开 [S7]。

本研究的边界。本报告聚焦"AI 应用与 Agent"这一软件应用层（含横向记录系统、垂直 agent、协作工具、广告引擎、推理基础设施），不展开底层算力/芯片（属邻接的 AI 数据中心赛道）与基础大模型本身（OpenAI/Anthropic 等多为私有，仅作上游约束讨论）。截图给定的 26 只 L4 标的池全部纳入 §8 图谱并在 §4-§6 找到产业链归宿。本研究止于行业逻辑、上下游与标的寻找，不输出仓位、目标价与买卖评级。

# 三、产业全景与双轴定位（生命周期 × 周期相位）

*这一节建立产业的"心智模型"，并做双轴定位：① 生命周期（结构性）+ ② 当前周期相位（周期性）。*

<!--VIZ:cycle-->

AI 应用与 Agent 是一个被两股力量同时拉扯的产业。从绝对规模看，它坐落在全球软件这个 ~$430B 的大盘里 [S6]，而 AI 本身是一个更大的容器，Gartner 估 2026 年全球 AI 支出约 $2.59T（+47% YoY），占全部 IT 支出 $6.31T 的约 41% [S2]。但要把"agentic AI 软件"这个细分单独拎出来，口径立刻分化：Mordor、Grand View 等给出的纯 agentic AI 软件市场 2026 年约 $9.1-10.9B（2025 年约 $7-7.6B），40%+ CAGR，2031 年达 $57B、2034 年 $139B（Grand View 40.5% CAGR）至 $324B（Allied 44% CAGR）[S3]。这三组数字（$2.59T 全 AI 支出、$450B 到 2035 年的企业应用软件 agent 收入、$10B 的纯 agentic 软件市场）不是同一个市场，而是三个正交的测量，引用时必须言明口径 [S2][S3]。

## 3.0 轴①：生命周期阶段（结构性）

阶段诊断是**成长早期（早期采用向早期大众过渡）**。五维证据指向同一结论。其一，渗透率极低且斜率陡峭：企业应用内嵌 agent 从 <5% 跳向 40%（2025→2026E），但真正进入生产的仅 11% [S21]，说明品类远未饱和。其二，增速分化但头部仍高速：Salesforce Agentforce ARR 一年增长 169% 至 $800M（FY26Q4），随后突破 $1B（FY27Q1，+205% YoY）[S4]，ServiceNow Now Assist ACV 一年翻倍冲击 $1B 目标 [S5]。其三，模式创新活跃：定价从席位制裂变出用量、结果、信用点、agent-as-employee 四种新模型 [S6]。其四，利润集中度高度悬殊：广告引擎（APP 调整后 EBITDA 利润率 85% [S7]）与薄工具（多家亏损或微利）天差地别。其五，一级融资与并购同步升温：NICE 以 $955M 收购 Cognigy、UiPath 收购 WorkFusion [S14][S18]，Pega/GitLab 被点名为并购标的 [S12]。

这个阶段意味着什么？值得注意的是，成长早期叠加技术路线未定，最大的特征是"赢家尚未锁定、但输家已经可识别"。市场对 agent 终局价值在应用、agent、数据还是基础设施哪一层累积没有共识 [S17]，这正是它把整个软件篮子的折现率一齐抬高、无差别杀估值的根因 [S17]。对配置者而言，这种"方向确定、归属未定"的阶段，奖励的是能识别结构性受损者（薄工具）与结构性受益者（数据围栏）的差异化，而非押注某个单一赢家。

## 3.0b 轴②：当前周期相位（周期性·V2.6）

与此同时，软件/SaaS 的主导周期是**资本 + 估值周期**（不同于硬件的产能+库存）。当前相位判断为**收缩后的触底重估区**。证据有三：其一，估值已从高位剧烈收缩，软件前瞻 P/E 跌至 22.7x、史上首次低于标普 500，IGV 自高点 -22%，相对标普为软件史上最差回撤 [S8]。其二，经营基本面尚未跟随崩塌，毛留存仍 ≥90% [S17]，多年增速放缓（SaaStr 称公开 SaaS 增速自 2021 峰值每季下滑）是底层柴火、AI agent 是加速剂 [S8]。其三，定价模型正处迁移的阵痛期，客户在 12-24 个月内为同一份活付两次钱（旧席位 + 新 agent 用量），TCO 一度上升 30%+ [S6]，这压制了近端利润、放大了估值的不确定性。

## 3.0c 量价拆分：行业量纲层（V2.12 · 量·率·期）

软件业没有统一的物理"出货量"，本节按量纲字典把"互联网/软件"路由到 MAU/ARR/RPO 三件套，并诚实降级为"龙头披露 agent 指标 bottom-up 加总"作行业量代理，覆盖头部约 5 家、与二手市场规模并列交叉。**量**：以纯 agentic AI 软件市场规模作行业总量时序（年度，单一频率），2024E ~$5B → 2025 ~$7.3B → 2026 ~$10B，YoY 约 +40-46% [S3]；底层兑现量以龙头 agent ARR 加总印证，CRM Agentforce ARR $0→$0.8B→$1B+（一年内）[S4]、NOW Now Assist ACV 翻倍冲 $1B [S5]、UiPath 总 ARR $1.85B [S18]、NICE AI 与自助 ARR $328M（+66% YoY）[S14]。**率**：效率指标看 NRR 与 agent ARPU，记录系统 cRPO 维持 +25%（NOW）[S5]、Pega Cloud ACV +29% [S12]，薄工具 NRR 承压、Atlassian 席位转负 [S8]。**期**：前瞻量看 RPO/cRPO 与 guidance，NOW cRPO $12.85B（+25% YoY）[S5]、CRM Q2 FY27 cRPO 指引约 +13% cc [S4]，龙头 guidance 隐含增速（CRM ~13%、NOW ~20%）显著高于薄工具组（MNDY FY 指引降速到 +19-20%，2025 还是 27% [S15]），背离 >10pp，印证份额从薄工具向记录系统抢夺。

## 3.1 市场规模自下而上三角验证（V2.4）

二手 market-research（Mordor/Grand View/Allied）的 agentic AI TAM 口径混乱、互相打架（2034 年 $139B vs $324B，差 2.3 倍）[S3]，只能作交叉参考。本节用自下而上锚定可寻址市场：

自下而上推算 = 全球企业知识工作者数 × 可及渗透率 × 单座 agent 年化支出。以约 8 亿全球知识工作者为基数，假设 2029 年企业 agent 渗透率达 15%（Gartner 调查中 60% 企业称两年内部署、但取消率高，取保守 15%）[S21]，单座年化 agent 支出按当前 Agentforce $2/对话、Adobe $19.99/4000 信用点、Intuit 用量计费等折算约 $1,500-2,500/座，得自下而上 TAM ≈ 8亿 × 15% × $2,000 ≈ $240B（2029E）。这与 Gartner"2035 年 agent 驱动 $450B 企业应用软件收入"[S2] 在斜率上自洽，远高于纯 agentic 软件 $57B（2031E）的狭义口径 [S3]，差异来源是口径：自建口径计入嵌入既有订阅的 agent ARPU，狭义口径只算独立 agentic 产品。

| TAM 口径 | 数值 | 来源 | 可信度 |
|---|---|---|---|
| 自下而上（本研究自建·主锚）| ~$240B（2029E）| 8亿知识工作者 × 15% × $2,000 | ⭐⭐⭐⭐ |
| 二手 A（企业应用 agent 收入）| $450B（2035E）| Gartner [S2] | ⭐⭐⭐ |
| 二手 B（纯 agentic 软件）| $57B（2031E）| Mordor [S3] | ⭐⭐ |

选自下而上为主锚，因其乘数可溯源（知识工作者数、渗透率、单座支出均有锚）；二手口径虚高/偏低源于"嵌入式 vs 独立式"的统计边界差异。

## 4.1 上中下游如何回应核心论断（V2.0）

七层结构对四个论断给出了清晰的产业级映射。论断 1（分叉）的物质载体横跨第三、四、五层：第三、四层（记录系统 + 垂直确定性 agent）拥有分发或专有数据、属"两端"，第五层（薄工作流）属被挤的"中间"，整条传导链就是分叉的产业证据，同样卖软件，FICO 的 PS 12.2 与 ASAN 的 PS 2.0 [真调] 反映的正是市场对"数据围栏 vs 薄工具"的定价分歧。论断 2（货币化滞后）的验证位置在第二、三层与第六层的对比：第六层广告引擎收入已兑现（APP +59% YoY [S7]），而第二、三层企业 agent 仍在 booking（Agentforce ARR 占 CRM 收入 <3% [S4]），同一产业链上"已兑现"与"待兑现"并存。论断 3（广告引擎最实）直接锚在第六层。论断 4（命门在两端）由第零、一、二层共同验证：推理基础设施（NET）、分发（MSFT/CRM）、数据围栏（NOW Action Fabric / SAP API policy）三处恰是 agent 无法绕过的咽喉。

| 论断 | 主要验证位置（产业链层级 + 玩家）| 次要验证 / 反驳信号 |
|---|---|---|
| 论断 1 | 第三/四层（CRM/NOW/FICO）vs 第五层（ASAN/MNDY）的估值分叉 | 反驳：若薄工具 NRR 维持 >105% |
| 论断 2 | 第二/三层 agent ARR 占总收入 <10%（CRM/NOW）| 反驳：任一龙头 agent 收入占比 >15% |
| 论断 3 | 第六层 APP/META 收入端兑现 | 反驳：APP H2 增速跌破 25% |
| 论断 4 | 第零/一/二层（NET/MSFT/NOW 数据围栏）| 反驳：bundling 未致席位负增长且 NET PS <15x |

# 五、价值链与利润池

*这一节回答："这个产业的钱从哪来到哪去？最终落在谁口袋？未来 3 年迁移方向？"*

如果用一句话概括这个产业的利润分布，那就是：**钱从企业 IT 预算流入，但利润正在从"卖席位的中间层"向"控分发的两端 + 控专有数据的垂直层"迁移**。当前的利润格局极不均衡：广告引擎以 85% 的调整后 EBITDA 利润率独占鳌头（APP）[S7]，记录系统以高 FCF yield + 高留存稳坐第二（CRM FCF yield 12.8%、ADBE 11.4% [真调]），而协作薄工具多数微利或亏损（ASAN、GTLB、C3.ai 仍在亏损 [真调]）。agent 浪潮没有改变"利润集中在两端"的结构，反而强化了它，因为 agent 进一步抬高了"分发 + 数据"的价值、压低了"纯界面"的价值 [S17]。

## 5.1 价值传导 / 上下游利润流图（V1.9.2）

下图把"企业 IT 预算 → 各层拆分 → 最终利润沉淀点"完整还原。钱怎么从企业买家流向上游、又最终聚集在哪几个口袋，是理解利润迁移方向的关键。

## 5.2 链节利润池详表

更具体地按链节拆解，整个产业的利润分布如下：

| 链节 | 营收占比（相对）| 利润集中度 | 净利率/效率 | 利润中心 |
|---|---|---|---|---|
| 广告引擎（第六层）| 中 | ⭐⭐⭐⭐⭐ | EBITDA 85% [S7] | APP/META |
| 分发+数据围栏（第二层）| 高 | ⭐⭐⭐⭐⭐ | 议价权（非直接 app 收入）| MSFT/NOW/CRM |
| 记录系统（第三层）| 最高 | ⭐⭐⭐⭐ | FCF yield 10-13% [真调] | CRM/SAP/INTU |
| 垂直确定性 agent（第四层）| 中 | ⭐⭐⭐⭐ | PS 7-12x 溢价 [真调] | FICO/GWRE/PEGA |
| 推理基础设施（第零层）| 小 | ⭐⭐⭐ | 用量计费/期权 | NET |
| 协作薄工作流（第五层）| 中 | ⭐⭐ | 微利/亏损 [真调] | ASAN/MNDY/DOCU |

这张表揭示了一个常被忽视的事实：营收规模与利润集中度并不一致。记录系统营收最大但利润集中度让位于广告引擎与数据围栏；薄工作流营收不小，却处在利润链的最底端。原因在于 agent 把"功能"商品化了，能被 AI 重生成的界面价值塌缩，而分发、专有数据、已验证的 ROI 引擎价值放大 [S17]。

至于成本结构，agent 时代单位经济学最大的变量是推理成本（token）。一个典型 agent 任务可能串联十次模型调用，单家厂商若补贴推理（如 Duolingo Max 的 AI 功能因重度使用推高推理成本、2026 EBITDA 利润率从 29% 压到 ~25% [S16]），毛利承压；若转嫁给客户（Adobe 信用点 razor-blade、Intuit 用量计费 [S11]），则面临定价阻力。赢家是那些能在规模上把 agent 驱动收入做到 70%+ 毛利的平台 [S17]。

| 环节 | 成本驱动 | 关键数据 | 卡脖子等级 |
|---|---|---|---|
| 推理（token）| 每次调用计费 | GPU 利用率均 20-40% [S10] | ⭐⭐⭐⭐ |
| 分发触达 | 既有渠道 | 微软 E7 $99 挤压 [S9] | ⭐⭐⭐⭐⭐ |
| 专有数据 | 历史积累 | FICO/GWRE 不可重生成 | ⭐⭐⭐⭐⭐ |
| 销售获客 | CAC | Duolingo 口碑获客低 CAC [S16] | ⭐⭐ |

未来 3 年，利润池将向**分发渠道 + 推理基础设施 + 专有数据围栏**三处加速迁移。记录系统中那些拥有分发或不可重生成数据的（CRM/NOW/SAP/FICO/GWRE）会通过 agent ARPU 扩张分到迁移红利；薄工作流若无法在 2027 年前转出席位制、建立用量/结果定价并守住毛利，会持续失血 [S6][S17]。这条迁移路径是后续 §6 link 排序与 §8 标的分层的底层逻辑。

## 6.1 Link 1: 横向记录系统与 Agentic 平台（CRM / NOW / SAP / WDAY）

**速览**：产业链第三层、利润与现金核心 · 估值判断：1 级（agent ARR booking）领先 / 2 级（收入确认）滞后 · 优先级 P0 · Top 标的 CRM / NOW / SAP

**对应论断**：直接验证论断 1（fortress 上行）+ 直接验证论断 2（货币化滞后）

横向记录系统是企业运行的"操作系统"，CRM 管销售、NOW 管 IT 与工作流、SAP 管 ERP、WDAY 管 HR 与财务。它们的共同点是拥有企业的权威数据集与合规框架，这正是 agent 无法重生成的资产 [S17]。在 agent 时代，这层的核心叙事从"卖席位"转向"卖 agent 工作单元"：Salesforce 把战略重定义为"Agentic CRM"，ServiceNow 自称"企业重塑的 AI 控制塔"[S4][S5]。它们的命脉在于，agent 要在企业里干活，必须调用这些系统里的真实数据与确定性工作流，而非凭空生成，这给了记录系统在 agent 价值链里的结构性位置。

这层的发展史是一部"从订阅到 agent ARPU 扩张"的进化史。过去十年记录系统靠 SaaS 订阅 + 席位扩张增长；2024-2025 年它们集体嵌入 AI（Einstein/Now Assist/Joule）；2026 年进入 agent 货币化元年。当前生命周期处于成长成熟交界，基础订阅成熟（CRM 收入 $42.8B、SAP $37.3B [真调]），但 agent 层刚起步、增速极高（Agentforce ARR FY26Q4 +169% 至 $800M、FY27Q1 突破 $1B、+205% YoY [S4]）。这种"成熟基座 + 高增新层"的结构，是记录系统区别于纯成长或纯价值股的关键。

谁在玩、谁卡在哪？Salesforce 的 Agentforce 在 FY26 Q4 达 ARR $800M（+169% YoY）、29,000 笔交易（环比 +50%），Agentforce + Data Cloud 合计 ARR $2.90B（+200% YoY），且 >60% 交易来自存量客户，交叉销售印证了分发优势 [S4]。到 FY27 Q1，Agentforce ARR 突破 $1B、AI + 数据合计 ARR $3.4B、交付 38 亿个 Agentic Work Units [S4]。ServiceNow 在 CY2025 Q4 订阅收入 $3,466M（+21% YoY），Now Assist ACV 翻倍冲击 $1B 目标，244 笔 >$1M 净新增 ACV 交易（+~40% YoY），cRPO 达 $12.85B（+25% YoY）[S5]。卡点在于：这些 agent 收入虽增速惊人，但绝对占比仍极小，Agentforce $1B ARR 相对 CRM $42.8B 收入不足 3%，这就是论断 2 所指的"预订已起、确认滞后"。

⭐ **1 级 vs 2 级估值错配**：这是本 link 最值得关注的地方。市场在 SaaSpocalypse 中把记录系统与薄工具一齐抛售，但两者的产业链位置截然不同。真调数据显示，CRM 当前 PE 18.4x、FCF yield 12.8%，SAP PE 21.9x、INTU PE 16.3x [真调]，这是把高留存、厚现金、且正在 agent ARPU 扩张的记录系统，定价到了接近市场平均甚至以下。对比之下，ServiceNow PE 58.5x、EV/EBITDA 34.2x [真调] 仍是高估值，反映市场对其 agent 兑现度给了更高溢价。一个直观的错配信号：Salesforce 现以约 14x 前瞻 PE 交易、ServiceNow 约 25x [S4]，两者同处 agent 货币化第一梯队，但定价差异巨大，市场对"谁的 agent 兑现更快"押注分化。错配的核心在于：1 级看 booking（cRPO +25%、Agentforce ARR +205%、FY27Q1）极强，2 级看当期收入确认（占比 <5%）尚弱，估值在两者之间摇摆。

护城河与风险。记录系统的护城河是高切换成本 + 专有数据 + 合规框架，这在 agent 时代被强化而非削弱 [S17]。但风险同样实在：第一，微软 E7 bundling 对 CRM/NOW 的部分功能构成挤压 [S9]；第二，agent 货币化若大面积证伪（Gartner 称 2027 底 40% 项目取消 [S21]），当期估值的牛市定价需下修；第三，记录系统自身在为数据筑墙（Action Fabric）引发用户组（DSAG）与生态反弹 [S19]，过度收费可能反噬开放性。综合看，这是"方向最确定、但兑现时点未到"的一层。

## 6.2 Link 2: 广告 / 推荐 Agentic 引擎（APP / META）

**速览**：产业链第六层平行流、唯一收入已兑现的 agentic ROI · 估值判断：1 级（已兑现高增长）已部分定价 / 2 级（e-commerce 放量）期权未定 · 优先级 P0 · Top 标的 APP / META

**对应论断**：直接验证论断 3（广告引擎最实）

如果说企业 agent 还在 PPT 与 booking 阶段，广告引擎已经在收入端跑出了第一个产业级 agentic ROI 样本。AppLovin 的 AXON 是一台自有的机器学习引擎，以微秒级速度在海量竞价中匹配广告主需求与发行商供给，广告主设定回报目标，AXON 评估每次曝光对该广告主的价值并出价 [S7]。这套"回报信号反馈闭环"在游戏广告里已被验证，命脉在于它是一个闭环优化的 agent：广告主只需给目标，引擎自主决定分配，这正是 agentic AI 在商业上最干净的落地形态。

AXON 的发展史是一部"从游戏向电商外溢"的扩张史。引擎在移动游戏里成熟后，2026 年向 DTC 商家全面铺开，管理层估计电商 TAM 是核心游戏业务的 5-10 倍 [S7]。当前生命周期处于"核心成熟 + 新 vertical 爆发"的拐点：2026 年 6 月，AppLovin Ads 首次对公众开放自助投放，14 年来广告主第一次无需直客关系即可上平台，这被广泛视为决定性的 binary 事件 [S7]。

谁在玩、谁卡在哪？财务上 AppLovin 极为强劲：Q1 2026 收入 $1.84B（+59% YoY、+11% QoQ），调整后 EBITDA $1.56B（85% 利润率，史上最高季度），FCF $1.29B [S7]；FY2025 收入 +70% 至 $5.48B [S7]。分析师已把 2026 电商收入估算从 $1.05B 上调到 $1.45B [S7]。一个鲜活案例：一家厨具品牌从 $4M 年收入做到 $16M、并预计冲 $80M，大部分广告花在 AppLovin [S7]。卡点有二：其一，公司已不分项披露 vertical 收入（MAX/AXON 统一竞价），故电商收入为分析师估算（C 级）[S7]；其二，SEC 正就其数据收集做问询，叙事从"不可阻挡的 AI 增长"转向"监管风险管理"[S7]。META 则是另一条路径，Advantage+ 把 AI 投放嵌入自有超级分发，是巨头版的 agentic 广告。

⭐ **1 级 vs 2 级估值错配**：APP 当前 PS 26.0、PE 41.5、EV/EBITDA 33.1 [真调]，这是把"已兑现的 85% 利润率 + 59% 增速"给了明确的成长溢价，1 级已部分定价。真正的 2 级期权在 e-commerce 自助放量：6 月 GA 后若放量成功，收入再上一个台阶、估值有望 re-rate；若放量慢于预期（Citi 已提示电商客户 ramp 较慢、维持 $710 目标 [S7]），溢价会回吐。对比 META PS 6.5、PE 20.0、EV/EBITDA 12.8 [真调]，同样是 AI 广告引擎，META 因体量巨大（收入 $215B）+ 成熟，定价远低于 APP，是"已兑现但增速温和"的另一种性价比。错配的关键变量是 APP e-commerce 的放量节奏，这是论断 3 的 falsifier 所在。

护城河与风险。AppLovin 的护城河是数据飞轮（回报信号闭环越用越准）+ 切换成本（广告主依赖其 ROAS）。值得强调的是，AppLovin Ads 被明确设计为可由 AI agent 直接访问，当广告主用 agent 规划投放、生成创意、调配预算时，平台天然对接 agent [S7]，这让它在"agent 驱动广告"的下一阶段占位。风险包括：估值偏高、隐私与平台政策变化、移动游戏集中度、自助放量能否不伤毛利与广告主信任、以及 SEC 问询的监管尾部 [S7]。

## 6.3 Link 3: 推理基础设施与边缘控制层（NET Cloudflare）🌿

**速览**：产业链第零-一层、agent 的延迟与推理命门 · 估值判断：1 级（高 PS 期权）已定价 / 2 级（agent 工作负载放量）未定 · 优先级 P1 · Top 标的 NET

**对应论断**：直接验证论断 4（命门在推理基础设施）

当所有人盯着 app 层 agent 时，真正的命门正在悄悄上移到推理与边缘控制层。Cloudflare 的 Workers AI 是一个无服务器推理平台，在全球网络的 GPU 上运行模型，且推理与 Workers、存储在同一网络、无跨云跳转的延迟 [S10]。它的命脉在于一个被低估的物理事实：agent 工作流往往串联十次模型调用，单个慢 provider 不是加 50ms 而是加 500ms，而用户对速度的感知系于首 token 时间，边缘邻近性在 agent 时代从"锦上添花"变成"延迟命门"[S10]。

这层的演进史是一部"从模型宿主到推理控制平面"的升级史。Cloudflare 早期只跑轻量开源模型，2026 年已能在 Workers AI 上跑前沿模型（Kimi K2.6，262K 上下文）[S10]，并把自己重新定位为统一推理层，一个 API 访问任意 provider 的任意模型，是 app 与模型之间的控制中间层 [S10]。Agents Week 2026 上它明确提出建"agentic cloud / Cloud 2.0"，并发布推理、搜索、记忆、语音、邮件、浏览器等让 agent 真正干活的原语 [S10]。当前生命周期处于早期成长，基础设施叙事刚起、agent 工作负载放量未至。

谁在玩、谁卡在哪？Cloudflare 用自身用量背书：内部 AI 工程栈跑在自家产品上，AI Gateway 路由 2000 万请求、处理 2410 亿 token、服务 3,683 内部用户 [S10]。经济性上，它打的是利用率痛点，GPU 平均利用率仅 20-40%、三分之一组织 <15%，Workers AI 让客户只为用量付费 [S10]；并用 Unweight 无损压缩实现 22% 模型体积缩减、号称最高 77% 成本节省 [S10]。卡点在于竞争激烈：微软 Entra Internet/Private Access 正逼近 Cloudflare Access 的功能 [S9]，AWS Bedrock/Azure 也在抢推理控制层；同时它的价值主张系于"让推理层变得无聊可靠"，一旦成了"又一个要 debug 的系统"，价值就翻转 [S10]。

⭐ **1 级 vs 2 级估值错配**：NET 当前 PS 36.2、收入仅 $2.33B、尚未盈利（EV/EBITDA 为负）[真调]，这是全报告估值最贵的标的之一，1 级已把"边缘网络 + AI 基础设施期权"充分甚至过度定价。2 级的真期权在于：agent 工作负载若真如其设想放量到"数千万并发会话"[S10]，Workers AI/AI Gateway 的用量计费会被 re-rate；若放量慢、或被超大规模云的推理服务挤压，36x PS 难以维持。这是典型的"高定价期权"，论断 4 的 falsifier（NET PS 压缩到 <15x）正是对这层的反向检验。

护城河与风险。NET 的护城河是 330 城的边缘网络（延迟优势）+ 开发者生态 + 多 provider 中立控制层。但它本身是"金枪鱼里偏贵的一只"，真正的紫苏叶属性体现在它卡住了 agent 的延迟与多模型路由这一咽喉、且用量计费天然契合 agent 经济学。风险：估值过高、超大规模云竞争、bundling 挤压（微软 Entra）、以及"推理层商品化"本身。

## 6.4 Link 4: 垂直确定性 Agent 与数据围栏（FICO / GWRE / PEGA / INTU）🌿

**速览**：产业链第四层、专有不可重生成数据护城河 · 估值判断：1 级（数据溢价）已定价 / 2 级（agent 决策放量）待验 · 优先级 P0 · Top 标的 FICO / GWRE / INTU

**对应论断**：直接验证论断 1（数据围栏 = fortress）+ 间接验证论断 4

这层是 SaaSpocalypse 中最被低估的"避风港"。垂直确定性 agent 的命脉在于它们控制着 agent 无法重生成的专有数据与确定性决策，FICO 的信用评分是监管嵌入的 de facto 标准，Guidewire 是 P&C 保险的核心系统，Intuit 每周有 5000 万笔交易流过其 AI [S11]，Pega 的决策引擎把每个决定锚定在业务规则与合规上 [S12]。在一个 AI 概率性输出不被接受的领域（法律、金融、合规），确定性输出 + 专有数据集 + 合规框架就是 2026 年的新护城河 [S17]。

发展史上，这层是"被 agent 强化而非削弱"的典型。FICO 评分诞生于信贷决策，数十年积累成行业标准，agent 再聪明也无法凭空生成一个人的历史信用数据；Guidewire 用十余年把保险核心系统做成行业基础设施，AI 更可能加速迁移到它而非取代它（类比 Procore 按施工量收费、成为行业数字基底 [S5]）。当前生命周期：FICO/GWRE 处于成熟稳态 + agent 决策放量早期，Intuit 正从订阅转向用量计费（8 月上线 QuickBooks 用量定价 [S11]）。

谁在玩、谁卡在哪？Pega 在 Q1 2026 Pega Cloud ACV +29% YoY、总 ACV +12% 至 $1,622M、FCF >$200M，Blueprint AI 驱动管道增长 [S12]，并被点名为并购标的（市值约 $6.3B，适合 Salesforce/ServiceNow/IBM/Oracle 或 PE rollup）[S12]。Intuit CEO 称 AI agent "已在规模上交付价值"，但市场反应剧烈，Intuit 因 CEO 称 AI 正快速驱动变化而一度跌 20% [S11]。卡点在于：这层的 agent 决策放量还需验证（确定性 agent 的实际渗透），且转用量定价短期会带来收入波动。

⭐ **1 级 vs 2 级估值错配**：这是本 link 的核心。FICO 当前 PS 12.2、PE 37.5 [真调]，市场已给信用评分的标准地位明确溢价，1 级充分定价。但 GWRE PS 7.1、INTU PE 16.3、PEGA PE 16.6 [真调] 则呈现错配：GWRE 拥有保险核心数据却 PS 仅 7.1，INTU 拥有 5000 万笔/周的财务数据图谱却 PE 仅 16.3、还因 AI 叙事被错杀 20% [S11]。市场在 SaaSpocalypse 中把这些"专有数据围栏"与薄工具一齐打折，恰恰错配了，它们是论断 1 里最不该被压的"fortress"。2 级期权在于 agent 决策（FICO 的 AI 决策、Pega Blueprint）放量后的 ARPU 扩张。

护城河与风险。护城河是不可重生成的专有数据 + 监管/合规嵌入 + 确定性输出需求，这是 agent 时代最硬的一类 [S17]。风险：第一，INTU/Pega 转用量定价的收入波动与执行风险；第二，监管变化（信用评分政策、保险监管）；第三，被巨头 bundling 或并购（Pega 已是标的）。综合看，这是"被错杀的数据围栏"，是分叉论断里确定性最高的受益层。

## 6.6 Link 6: 自动化 / RPA 向 Agentic 转型（PATH / PEGA）

**速览**：产业链第四层、agent 的"执行身体" · 估值判断：1 级（转型折价）已定价 / 2 级（agentic 放量）待验 · 优先级 P1 · Top 标的 PATH

**对应论断**：间接验证论断 4（agent 需要 RPA 作执行体）

需要强调的是，RPA 一度被认为会被 LLM 淘汰，2026 年的结论恰相反，它正成为 agent 的"执行身体"。命脉在于一个技术事实：agent 负责思考（解读、推理、规划），但不直接操作企业系统，而是把 RPA 工作流、API、函数当工具来调用，"agent 思考、机器人执行"，这种解耦让 agentic 自动化变得安全可行 [S18]。UiPath 在 2025 年系统性证明了 LLM 不会让 RPA 过时，反而 agent 需要一个自动化的"身体"去真正操作遗留系统 [S18]。

谁在玩、谁卡在哪？UiPath 的 ARR 在 2026 年初达 $1.85B，商业模式从按"机器人"计费进化到用量/按 agent 计费 [S18]；2026 年 2 月收购 WorkFusion，从横向自动化进入合规预建工作流，并聚焦欺诈检测作为切入大型金融机构的高价值入口 [S18]。卡点在于：微软 Power Automate 直接竞争 RPA、Copilot Studio 与 UiPath 的 agent 构建重叠，微软靠成本、默认分发与原生契合竞争，UiPath 强在复杂企业编排与遗留系统执行 [S18]；同时 UiPath 面临把 agentic AI 整合进 20 年 RPA 代码库的技术债风险 [S18]。Pega 的 BPM 引擎也提供类似"确定性 harness"，与本 link 重叠。

⭐ **1 级 vs 2 级估值错配**：PATH 当前 PS 3.3、PE 17.6、FCF yield 9.4%、现金 $1.31B（占 EV $4.23B 的 31%）[真调]，这是"转型期折价 + 厚现金"的组合。市场把它当成"被 agent 威胁的旧 RPA"打折，但它实际是 agent 执行层的卡位者（ARR $1.85B、转用量定价）。1 级（转型折价 PS 3.3）与 2 级（agentic 编排放量）的错配，取决于它能否在微软挤压下守住复杂企业编排的领地。这是期权型错配，beta 较高。

## 6.7 Link 7: 创意 / 设计 / 消费 AI（ADBE / DUOL / U / ADSK）

**速览**：产业链第四层、razor-blade 信用点货币化 · 估值判断：1 级（ADBE 被错杀）错配 / 2 级（AI 替代创意）双刃 · 优先级 P1 · Top 标的 ADBE / DUOL

**对应论断**：间接验证论断 1（ADBE 数据/工作流 vs 通用模型威胁）

另一方面，创意与消费 AI 是 agent 双刃效应最直接的品类，AI 既是它们的新货币化引擎，也是它们最大的商品化威胁。命脉在于工作流嵌入 + 信用点货币化：Adobe 用"razor-blade"信用点模式（$19.99/4000 信用点，多数生成 1 信用点/次）把高推理成本货币化、同时维持高毛利订阅 [S11]。Duolingo 则把 AI 做成 Max 高级层（Video Call/Roleplay 等），AI 层占付费基础约 9%（上年 5%）[S16]。

谁在玩、谁卡在哪？Adobe 在 SaaSpocalypse 中跌 30-45%，创意套件面临生成视频/设计平台的压力 [S8][S17]，但它仍握有创意工作流的事实标准 + Firefly 商业安全模型。Duolingo 2025 年底 DAU 52.7M、付费 12.2M，Q1 2026 DAU 56.5M（+21% YoY），目标 2028 年 100M DAU [S16]；2026 年是"投资年"，指引收入 +15-18%、EBITDA 利润率压到 ~25%（AI 推理成本）[S16]。卡点在于：通用 LLM（ChatGPT/Gemini/Claude）能以同等甚至更低成本做语言导师，Duolingo 的规模与游戏化是不是真护城河存疑 [S16]；ADBE 同理面临"为什么不用通用生成模型"的拷问。

⭐ **1 级 vs 2 级估值错配**：ADBE 当前 PE 11.6、EV/EBITDA 8.4、FCF yield 11.4% [真调]，这是把创意软件龙头打到了深度价值区间，反映市场对"被生成 AI 颠覆"的极度悲观。1 级（PE 11.6）与 2 级（Firefly 信用点货币化 + 工作流嵌入）严重错配：若 Firefly 货币化兑现 + 工作流粘性守住，估值有修复空间；若被商品化，便是价值陷阱。DUOL PE 13.9、PS 5.2 [真调] 处于"投资年压利润 + 高 DAU 增长"的过渡定价。U（Unity）PS 6.4、亏损（PE 175.8 失真）[真调] 是游戏引擎 AI 期权、beta 最高。

护城河与风险。ADBE 护城河是创意工作流标准 + 商业安全 AI + 企业渗透；DUOL 是游戏化 + 口碑获客（低 CAC，营业利润率 7%→15% [S16]）。风险：通用模型商品化、AI 推理成本压毛利、消费者为什么付溢价的拷问。

## 6.8 Link 8: 协作 / 参与薄工作流（at-risk 组：ASAN / MNDY / DOCU / ZM / GTLB / BILL / HUBS / C3.ai）

**速览**：产业链第五层、被两端挤压的中间层 · 估值判断：1 级（已大幅折价）/ 2 级（转型成败决定生死）· 优先级 P2（风险监控）· Top 标的 监控为主

**对应论断**：直接验证论断 1（薄工具席位压缩）+ 间接验证论断 4（被 bundling 挤压）

数据显示，这是 SaaSpocalypse 的震中。协作薄工作流的结构性弱点在于：如果一个 SaaS 产品本质是"带几个按钮的界面"、主要工作是让人在系统间搬运数据，它就正处在 AI 替代的爆炸半径内 [S6]。命脉问题是它们既不掌握分发，也没有 agent 无法重生成的专有数据，正是论断 1 与 4 里被两端挤压的"中间层"。标志性事件：Atlassian 报告了史上第一次企业席位下降、股价跌 35% [S8]。

谁在玩、谁卡在哪？monday.com 在 Q1 2026 收入 $351.3M（+24% YoY），推出 AI Work Platform + 原生 agent + "席位 + 信用点"定价，主动转出纯席位制 [S15]；但 FY 指引降速到 +19-20%（2025 还是 27%）[S15]。Asana 用 per-agent 部署 + 执行量的混合模型 [S15]。这层的共同卡点：转用量/结果定价的执行风险（打包、权益、销售提成、预测全是按席位建的），转型本身带来收入波动、降低锁定、压缩定价权与 NRR [S15]。C3.ai 是这层里最待证的一个，FQ3 2026 收入仅 $53.3M、GAAP 毛利率 17%、持续亏损（每股 -$0.94），靠联邦订单（+134% YoY）撑增长、现金 $621.9M [S13]，是高风险的纯故事股。

⭐ **1 级 vs 2 级估值错配**：这层的 1 级已大幅折价，ASAN PS 2.0（亏损）、MNDY PS 2.9、DOCU PS 2.6、BILL PS 2.2 [真调]，市场已把"席位压缩"price-in 到接近末日。错配方向与前几个 link 相反：这里的风险是 1 级折价可能还不够（若席位转负扩散、转型失败，估值仍有下行），而非被错杀。判别标准是论断 1 的 falsifier：若某家 NRR 维持 >105%、成功转出席位制（如 MNDY 的席位+信用点若放量），则被错杀；若 NRR 跌破 100%、席位转负，则折价合理甚至不足。这是"价值陷阱 vs 困境反转"的分水岭，需逐个标的验证、不可一概而论。

护城河与风险。这层多数护城河薄弱（低切换成本、无专有数据），少数有局部粘性（DOCU 的电子签名网络效应、HUBS 的中小企业 CRM 生态、BILL 的支付流）。风险：席位压缩、微软 E7 bundling 挤压（Teams/Loop 替代协作工具）[S9]、转型执行、以及被并购或退市。

# 七、地缘与政策约束

*这一节讲产业的国别集中度 + 地缘/监管风险 + 政策窗口。*

AI 应用与 Agent 产业的地缘格局高度简单又高度集中：这是一个美国近乎垄断的产业。26 只标的池中，除 SAP（德国）、NICE 与 monday.com（以色列）外，全部为美国上市公司 [真调]。基础模型（OpenAI/Anthropic/Google）、分发渠道（微软/CRM/NOW）、广告引擎（APP/META）、推理基础设施（NET）全部在美国手里。这与硬件产业链"美日韩欧分极"的格局截然不同，软件 agent 的"卡脖子"不在跨国材料分布，而在分发与数据围栏，而这两者都集中在美国超大规模平台手里。因此本产业的地缘 materiality 主要体现在**监管 + 平台政策**而非国别供应链。

国别矩阵分三视图呈现：(a) ASCII 世界分布图按国家组团勾勒格局；(b) markdown 矩阵给每国代表玩家；(c) 海外节点延伸表给少数非美前哨。需说明的是，由于本产业美国集中度极高，三视图主要用于呈现"美国一极 + 欧以少数前哨"的结构，而非多国寡占。

矩阵之外还有几个关键监管节点不能忽视。最重要的不是国别，而是平台政策：ServiceNow 的 Action Fabric 与 SAP 禁止未授权 AI 调用 API 的政策，本质是记录系统在为"谁能让外部 agent 访问企业数据"立法 [S19]。SAP CEO Klein 强调客户不会为访问自己的数据付费、架构保持开放，但 DSAG 用户组与生态（已为微软 Copilot/Salesforce Einstein 建连接器的厂商）仍强烈反弹 [S19]。这场"数据围栏 vs 开放生态"的拉锯，是 agent 时代最关键的政策变量。

本产业地缘风险的本质是"美国平台集中度 + 监管尾部"。最大的政策不确定性来自三处：微软 bundling 的反垄断审视、欧盟 AI Act 对 agent 的合规约束、以及数据围栏（Action Fabric/SAP policy）能否经得起用户与监管的双重压力。对配置者而言，地缘不是本产业的主要风险来源，监管与平台政策才是。

数字化解读：本表把"估值错配"从形容词变成数字，几个信号清晰可见。第一，被错杀的 fortress，CRM（PE 18.4）、SAP（21.9）、INTU（16.3）、ADBE（11.6）、NICE（10.9）都被定价到接近或低于市场平均，但它们或有专有数据围栏、或有 agent ARR 高增，是分叉论断里"两端"被错杀的核心。第二，高定价期权，NET（PS 36）、APP（PS 26）、NOW（PE 58.5）已 price-in 大量未来，是 beta 而非价值。第三，亏损/现金消耗型，C3.ai（亏损、FCF -1.9%、现金 $0.58B / 季度净亏约 $0.06B，跑道约 30 月）、ASAN/GTLB/BILL 是 at-risk 组里需结合跑道判断的标的；ZM 现金占 EV 44%（$7.72B/$17.7B）提供下行缓冲。第四，份额-估值错配，NICE（AI ARR +66% × PS 1.8）、GWRE（保险核心 × PS 7.1）是"高增长 × 低估值"的最强 alpha 候选。解读限于数据与错配信号本身，不给买卖动作。

**核心标的 1 深度论述（GWRE）**。Guidewire 是分叉论断里最被低估的"专有数据围栏"。它在 P&C 保险核心系统的地位类似 Procore 之于建筑，AI 更可能加速迁移到它、而非取代它 [S5]。保险公司的核保、理赔、保单核心账本是数十年积累的确定性数据，agent 无法凭空生成；而 PS 7.1 的定价，在 SaaSpocalypse 的无差别抛售里把它当成了普通 SaaS [真调]。它的链上不可替代性在于：保险是确定性输出不容妥协的领域（理赔金额、合规），正是 AI 概率性输出最不被接受、专有数据护城河最硬的场景 [S17]。数据画像上，GWRE 收入 $1.42B、PS 7.1、FCF yield 2.8%、EV/EBITDA 76.9（反映其仍在云迁移投入期、利润未释放）[真调]，这是"高质量数据资产 + 利润未释放"的组合，2 级期权在云迁移完成 + agent 决策放量后的利润释放。

**核心标的 2 深度论述（NICE）**。NICE 是"被当成颠覆对象、实为颠覆者"的典型错配。市场把它当成被 agent 颠覆的旧 CX 厂商打到 PS 1.8、PE 10.9 [真调]，但它本身是 agentic CX 的领先供应商：AI 与自助 ARR $328M（+66% YoY）、backlog +25% YoY、2026 云收入指引加速到 14.5-15% [S14]。它的链上位置在第四层垂直 agent，命脉是 CX 数据 + 企业合规部署 + Cognigy 的 agentic 能力。数据画像极具吸引力：EV/EBITDA 仅 6.1、FCF yield 9.0%、PE 10.9 [真调]，这是把一个 AI ARR 高增的 CX 龙头定价到了深度价值区间。核心风险是 CX 席位压缩的双刃效应（新 AI ARR 能否盖过旧席位流失），这是 2 级的关键验证点。

**反方标的论述（C3.ai）**。C3.ai 是产业链逻辑下最可能被证伪/价值陷阱的标的。它处在第五层"待证"位置，FQ3 2026 收入仅 $53.3M、GAAP 毛利率 17%、持续亏损（每股 -$0.94）、靠联邦订单（+134% YoY）撑增长 [S13]。它的结构性弱点是：缺乏专有数据围栏、缺乏分发、靠政府合同集中度撑营收，正是论断 1 与 4 里被两端挤压、且无护城河缓冲的标的。触发信号：联邦订单增速放缓 + 毛利率持续低位 + 现金消耗（现金 $621.9M、按当前消耗约 30 月跑道）。本节只描述风险结构，不给做空指令。

# 九、风险、证伪与月度跟踪

*这一节告诉读者"什么时候应该放弃这个 thesis" + 提供月度跟踪 KPI。*

任何投资 thesis 都需要清晰的 kill condition。本研究四大论断的 kill 条件如下：

| Thesis | Kill 触发 | 概率（3yr）| 应对动作 |
|---|---|---|---|
| 论断一（分叉）| 至 2027 底 at-risk 组 NRR 中位数仍 >105% | 中 | 放弃"薄工具结构性受损"判断 |
| 论断二（货币化滞后）| 任一龙头 agent 收入占总收入 >15%（2026 底）| 低 | 上修赢家估值、滞后判断证伪 |
| 论断三（广告引擎最实）| APP H2 2026 收入增速跌破 25% YoY | 中 | 削弱"广告引擎兑现度最高"判断 |
| 论断四（命门在两端）| bundling 未致任何 at-risk 席位负增长且 NET PS <15x | 中 | 重审"中间层被挤"结构判断 |

四个 kill 条件背后是同一个底层风险：agent 货币化的兑现度。Gartner 预计至 2027 底逾 40% 的 agentic AI 项目将被取消（成本失控、价值不清、风控不足），当前仅 11% 企业把 agent 跑进生产 [S21]。若这一兑现大面积失败，论断 2 先倒（agent 收入永远确认不上来），进而拖累赢家的牛市估值；反过来，若兑现快于预期，论断 2 的"滞后"被证伪、应上修而非下修赢家。这是本研究最大的双向不确定性。

**全链 worst case**。最坏情景是"agent 证伪 + bundling 通杀"的叠加：企业 agent 项目大面积取消（Gartner 40% 取消落地），同时微软 E7 把独立 SaaS 的协作/安全/BI 功能全面 bundling 替代 [S9]，导致不仅薄工具席位崩塌、连部分记录系统的边缘功能也被侵蚀。此情景下，软件前瞻 P/E 从 22.7x 进一步下探破 18x，至-risk 组多家退市或被并购，记录系统的 agent ARPU 扩张被证伪、估值回到纯订阅折现。概率不高但需监控，触发信号是 Gartner 取消率超预期 + 三家以上 at-risk 名席位转负同时发生。

# 十、邻接产业与历史类比

*这一节把当前产业放进更大的研究网络。*

AI 应用与 Agent 不是孤岛，它的上游与邻接决定了它的成本结构与价值归属。最紧的邻接是底层算力与基础模型，agent 的每一次推理都消耗 token，AI 总支出 $2.59T 里的大头在算力 [S2]，这条赛道（AI 数据中心、加速器、CPO 光互联）已在本研究系统的邻接容器有覆盖。理解 agent 应用层的利润，必须同时理解它向上游算力支付了多少"推理税"。

**强邻接产业（Top 3）**：

第一是 AI 数据中心与算力（强度 ⭐⭐⭐⭐⭐），它是 agent 的成本底座，推理成本（token）是 agent 单位经济学最大变量，GPU 利用率均 20-40% 决定了推理基础设施的经济性 [S10]。建议跟进：`/industry "AI 数据中心电力"`（本系统已有覆盖）。

第二是基础大模型层（强度 ⭐⭐⭐⭐），OpenAI/Anthropic/Google 的模型能力与定价直接决定 app 层 agent 的商品化速度，基础模型越便宜，Duolingo/ADBE 这类应用的护城河越受拷问 [S16]。建议跟进：`/industry "基础大模型与推理"`。

第三是网络安全（强度 ⭐⭐⭐⭐），agent 自主执行带来新的身份、权限、审计风险，微软 Entra/Security Copilot 与独立安全厂商（Zscaler/CrowdStrike）正争夺 agent 安全控制层 [S9]。建议跟进：`/industry "AI 时代网络安全"`。

**历史类比**。本研究只保留一个可量化的深类比：2002-2009 年报纸业被互联网颠覆。相似变量：一个成熟、高现金流的行业被一种新技术（互联网/agent）从根上改变价值捕获方式，市场情绪先于基本面崩塌。不同变量：报纸的核心资产（读者注意力）被整体迁移、无可守，而软件的核心资产（专有工作流数据 + 合规嵌入）对记录系统/数据围栏仍不可被 agent 重生成 [S17]。历史基准率：报纸群体 2002-2009 损失约 95% 价值，直到前瞻盈利预期完全重置才企稳 [S8]，这给软件的估值底提供了一个残酷参照，盈利预期不稳、估值底就不来。**类比失效条件**：若 agent 货币化在 2026-2027 大面积兑现（记录系统 agent ARR 占比快速升破 10%），则软件不会重演报纸的整体塌缩，而是分叉，这正是本研究与"SaaS 全死"叙事的核心分歧。

**跨产业 alpha 标的**：

| 标的 | 本产业叙事 | 邻接叙事 | 合并 thesis |
|---|---|---|---|
| NET | agent 推理控制层 | AI 数据中心边缘 | 边缘推理 + agent 双重暴露 |
| INTU | 财务数据图谱 fortress | 金融科技/支付 | 数据围栏 + fintech 双重 |
| META | AI 广告引擎 | 基础模型（Llama）+ 算力自建 | 广告兑现 + 全栈 AI |

**本研究 gap 与下次 update trigger**：本报告对基础模型层（多为私有）的覆盖较浅，且 agent 货币化"量"缺统一行业口径。下次 update 触发：(1) 2026 H2 APP e-commerce GA 结果；(2) 任一季度龙头 agent ARR 占比披露重大变化；(3) 软件前瞻 P/E 破 18x 或三家 at-risk 席位转负。

# 十一、结论与下一步

*这一节是闭环。*

回到 §0 与 §1 提出的四个核心论断，经过 §4-§10 的产业链全方位检验，本研究的整体判断是：AI agent 不会杀死 SaaS，但会把它劈成截然不同的两半，而当前 SaaSpocalypse 的无差别抛售恰恰没有充分定价这种分叉。数据显示，市场把软件前瞻 P/E 一齐打到 22.7x（史上首次低于标普 500）[S8]，但记录系统与数据围栏（CRM PE 18.4、SAP 21.9、INTU 16.3、NICE 10.9、ADBE 11.6 [真调]）拥有 agent 无法重生成的专有数据与分发优势，被错杀的程度远超薄工具应有的折价。这不是堆砌数据，而是把"SaaS 全死"这个论断在产业链上逐层试验后的结论，它在第五层成立，在第三、四层不成立。

## 11.1 核心论断验证情况（V2.0）

| 论断 | 验证状态 | 关键证据 | 更新看法 |
|---|---|---|---|
| 论断 1（分叉）| 🟡 当前证据一致 | FICO PS 12.2 vs ASAN PS 2.0 的估值分叉 + Atlassian 席位转负 [S8] | 维持；待 2027 底 NRR 数据裁决 |
| 论断 2（货币化滞后）| 🟡 当前证据一致 | Agentforce ARR $1B+ 占 CRM 收入 <3% [S4] | 维持；占比升破 5% 是兑现起点 |
| 论断 3（广告引擎最实）| 🟡 当前证据一致 | APP +59% YoY、EBITDA 85% 已兑现 [S7] | 维持；6 月 GA 放量是关键裁决 |
| 论断 4（命门在两端）| 🟡 hypothesis | 微软 E7 + Action Fabric 刚落地 [S9][S19] | 待 bundling displacement 与 NET 放量验证 |

四个论断目前都处于"当前证据一致"或"假设"状态，没有任何一个达到"已裁决"，因为 agent 货币化的兑现是一个 2026-2027 才会结算的过程，当前的截面数据只能支撑方向，不能宣告确认。本轮研究相对市场共识新增的关键变量是"分发 + 数据围栏作为命门"（论断 4），市场在杀估值时主要盯着"席位会不会被 agent 替代"（论断 1），却忽视了价值正向分发与数据围栏两端迁移这一更深的结构。被产业链最强力支持的是论断 1（分叉，估值数据已现分化）与论断 3（广告引擎，收入端已兑现）；最待验的是论断 4（命门在两端，bundling 与数据围栏政策刚落地，displacement 尚未显形）。

**Top 3 立即行动**：

第一，把 §8 的"被错杀 fortress"组（CRM/SAP/INTU/NICE/ADBE/GWRE）作为后续个股深研的最高优先输入，它们是分叉论断里确定性最高、且估值已被打到市场平均以下的一类，错配最值得逐个验证。

第二，把 APP 的 6 月 e-commerce 自助 GA 设为单一最关键的近端 catalyst 监控，它是论断 3 的 binary 裁决点，放量成功验证"广告引擎兑现度最高"，失败则削弱整个 agentic ROI 叙事的存在性证明。

第三，建立 at-risk 组（ASAN/MNDY/DOCU/C3.ai）的"困境反转 vs 价值陷阱"分流监控，以 NRR 企稳 + 席位同比 + 用量定价放量三个变量逐个判别，避免把整组当成低位价值机会误抄底。

**Top 3 M3 深研入口**：

第一优先 GWRE（Guidewire），保险核心系统的专有确定性数据 vs PS 7.1 的错配，是分叉论断里"被低估数据围栏"确定性最高的样本，云迁移完成后的利润释放是 2 级期权。

第二优先 NICE，AI ARR +66% × PE 10.9 的"颠覆者被当成被颠覆者"极端错配，核心验证 CX 席位压缩的净效应。

第三优先 APP（AppLovin），全报告唯一收入端已兑现的 agentic ROI 样本，6 月 GA 放量 + SEC 问询是高 beta 期权，需独立深研其 e-commerce 留存与监管尾部。

**给基金老板 / 投委会 30 秒电梯版**：

> AI agent 不会杀死 SaaS，而是把软件劈成"控分发与专有数据的两端（CRM/NOW/SAP/INTU/FICO/GWRE/NICE）re-rate 向上"与"薄工作流中间层（ASAN/MNDY/DOCU/C3.ai）席位压缩"两半；2026 年 SaaSpocalypse 把整个篮子无差别打到史上首次低于标普 500 倍数，错杀了被数据围栏保护的 fortress；当下唯一在收入端兑现的 agentic ROI 是广告引擎（APP +59%、EBITDA 85%），企业 agent 仍在 booking、收入确认滞后 4-8 季度，错配窗口在"被错杀的 fortress（GWRE/NICE/INTU/ADBE）"与"已兑现的广告引擎（APP）"。

# 附录 D：紫苏叶清单（金枪鱼 vs 紫苏叶）

> 方法论来源：Serenity「紫苏叶理论」，最昂贵 ≠ 最不可或缺。软件业的"紫苏叶"不在物理材料，而在 agent 无法重生成的专有数据、监管嵌入的确定性标准、与 agent 工作流的延迟/编排命门。

软件业的 chokepoint 与制造业不同：它分**设计/数据 know-how（不可采购）> 专有数据围栏 > 分发渠道 > 通用功能**四类，越靠前越是真命门。以下逐链节列出金枪鱼（明星）与紫苏叶（隐形/不可重生成命门）。

| 链节 | 金枪鱼（最贵/明星）| 🌿 紫苏叶（隐形命门）| chokepoint 论证 | 红队：若被替代靠什么 | chokepoint 类型/等级 |
|---|---|---|---|---|---|
| 垂直决策 | NOW/CRM（最贵记录系统）| FICO 信用评分（PS 12.2）| 监管嵌入 de facto 标准，agent 无法重生成历史信用数据 | 需监管重新认可新标准 + 数十年数据 | 数据 know-how ⭐⭐⭐⭐⭐ |
| 保险 | CRM（横向 CRM）| GWRE 保险核心系统（PS 7.1）| P&C 核保/理赔账本是确定性数据，AI 不容概率输出 | 需重建核心系统 + 十年数据迁移 | 专有数据 ⭐⭐⭐⭐⭐ |
| 财务 | INTU（PE 16.3）| INTU 50M tx/周数据图谱 | 周级千万交易构成不可复制的财务数据网络 | 需重建同等规模交易数据流 | 专有数据 ⭐⭐⭐⭐ |
| 推理 | NET（PS 36）| NET AI Gateway 多模型控制层 | agent 首 token 延迟 + 跨 provider 路由咽喉，用量计费契合 | 超大规模云自建推理控制层（正在做）| 编排/分发 ⭐⭐⭐⭐ |
| agent 基础设施 | —（多私有）| eval/观测/向量库/agent 身份 | agent 可靠性的隐形命门，市值微小流动性稀薄 | 通用模型内置 eval、商品化 | →需补（私有：Braintrust/向量库未上市）⭐⭐⭐ |
| 分发 | MSFT（M365）| M365 E7 bundling 默认分发 | $99 打包使分开买不划算，分发即护城河 | 反垄断限制 bundling | 分发渠道 ⭐⭐⭐⭐⭐ |

**紫苏叶清单一句话结论**：软件业真正的紫苏叶不是某个微小市值的零件供应商，而是 agent 无法重生成的"监管嵌入数据标准（FICO）+ 专有确定性账本（GWRE/INTU）+ 推理编排命门（NET）+ 默认分发（微软 E7）"，这四类是 agent 时代价值向两端迁移的物理底层，纯 agent 基础设施（eval/向量库/身份）多为私有、标"→需补"，绝不编造名字。

function buildChain(c){
 const rows=(c.layers||[]).map(l=>{
  const runs=l.p.map(x=>{const[nm,nat,pv,sh,tk]=x;return `<span class="pl ${sh?'sh':''}"><span class="sup ${NATCLS[nat]}">${SYM[nat]||''}</span>${nm}${tk?` <span class="tk">${tk}</span>`:''}${pv?'<span class="pv">私</span>':''}</span>`;}).join('<span class="sep">·</span>');
  const note=l.note?`<span class="note">▸ ${l.note}</span>`:'';
  const cls=l.ch>=5?'bn':l.ch>=4?'hi':'';

/* ===== industry 双轴定位：生命周期 S 曲线 × 周期相位（纯 SVG 编辑卡）===== */
function renderCycle(el,c){
 const sec=c.secular||{},cyc=c.cyclical||{},sig=c.signals||{};
 const sp=Math.max(0,Math.min(1,sec.pos!=null?sec.pos:0.5));
 const cp=Math.max(0,Math.min(1,cyc.pos!=null?cyc.pos:0.5));
 const W=320;
 /* ① 生命周期 S 曲线（logistic，左低右高）*/
 const sy=t=>58-(1/(1+Math.exp(-11*(t-0.5))))*48;
 let spath='';for(let i=0;i<=48;i++){const t=i/48;spath+=(i?'L':'M')+(t*W).toFixed(1)+' '+sy(t).toFixed(1)+' ';}
 const ST=[['萌芽',0.125],['成长',0.375],['成熟',0.625],['衰退',0.875]];
 const sticks=ST.map(s=>`<text x="${(s[1]*W).toFixed(0)}" y="65" text-anchor="middle" font-size="9" fill="#a89e8c">${s[0]}</text>`).join('');
 /* A3 轨迹：上期→当前（空心=上期、实心=当前），示意移动方向 */
 const traj=(prev,cur,yf,color)=>{if(prev==null||!isFinite(prev))return '';const x1=(prev*W),y1=yf(prev);return `<path d="M${x1.toFixed(1)} ${y1.toFixed(1)} L${(cur*W).toFixed(1)} ${yf(cur).toFixed(1)}" stroke="${color}" stroke-width="2" opacity=".5"/><circle cx="${x1.toFixed(1)}" cy="${y1.toFixed(1)}" r="3" fill="#faf8f3" stroke="${color}" stroke-width="1.5"/>`;};
 const sdot=`<circle cx="${(sp*W).toFixed(1)}" cy="${sy(sp).toFixed(1)}" r="5" fill="${OX}" stroke="#faf8f3" stroke-width="2"/>`;
 const svgS=`<svg viewBox="0 0 ${W} 70"><path d="${spath}" fill="none" stroke="#cbbfa6" stroke-width="2"/>${traj(sec.prevPos,sp,sy,OX)}${sdot}${sticks}</svg>`;
 /* ② 周期相位正弦（t=0 触底 → 0.5 见顶 → 1 触底）*/
 const cyv=t=>35+22*Math.cos(2*Math.PI*t);
 let cpath='';for(let i=0;i<=64;i++){const t=i/64;cpath+=(i?'L':'M')+(t*W).toFixed(1)+' '+cyv(t).toFixed(1)+' ';}
 const PH=[['触底',0.0],['扩张',0.25],['见顶',0.5],['收缩',0.75]];
 const cticks=PH.map(p=>`<text x="${(p[1]*W).toFixed(0)}" y="65" text-anchor="${p[1]===0?'start':'middle'}" font-size="9" fill="#a89e8c">${p[0]}</text>`).join('');
 const cdot=`<circle cx="${(cp*W).toFixed(1)}" cy="${cyv(cp).toFixed(1)}" r="5" fill="${GO}" stroke="#faf8f3" stroke-width="2"/>`;
 const svgC=`<svg viewBox="0 0 ${W} 70"><path d="${cpath}" fill="none" stroke="#cbbfa6" stroke-width="2"/>${traj(cyc.prevPos,cp,cyv,GO)}${cdot}${cticks}</svg>`;
 const col=(cls,h,arr)=>`<div class="col ${cls}"><h5>${h}</h5><ul>${((arr&&arr.length)?arr:['→需补']).map(x=>`<li>${x}</li>`).join('')}</ul></div>`;
 const basis=c.basis?`<div class="cyc-basis"><b>判断依据：</b>${c.basis}</div>`:'';
 const bm=c.benchmark?`<div class="cyc-bm"><b>历史对标：</b>${c.benchmark}</div>`:'';
 const syn=c.synthesis?`<div class="cyc-syn">▶ 证据链：${c.synthesis}</div>`:'';
 const cc=Object.assign({readhint:'横看结构（S曲线）、纵看周期（正弦）；空心点=上期、实心点=当前'},c);
 el.outerHTML=`<figure class="vizfig">${figHead(cc,'双轴定位 · 生命周期 × 周期相位')}<div class="cyc">`
  +`<div class="cyc-ax"><div class="cyc-lbl">① 生命周期（结构性）· 当前 <b>${sec.stage||'—'}</b>${sec.note?' · '+sec.note:''}</div>${svgS}</div>`
  +`<div class="cyc-ax"><div class="cyc-lbl">② 周期相位（周期性）· 主导 ${cyc.dominant||'—'} · 当前 <b>${cyc.phase||'—'}</b>${cyc.note?' · '+cyc.note:''}</div>${svgC}</div>`
  +`<div class="cyc-sig">${col('danger','⚠ 危险信号（→见顶/反转）',sig.danger)}${col('safe','✓ 安全信号（扩张可持续）',sig.safe)}${col('watch','◉ 关键观察变量',sig.watch)}</div>`
  +basis+bm+syn+`</div>${figFoot(cc)}</figure>`;
}

/* ===== industry 周期证据层①：强度指标时序小多图（纯 SVG sparkline）===== */
function renderTrend(el,c){
 const inds=c.indicators||[];
 const spark=ind=>{const a=(ind.points||ind.series||[]).filter(v=>v!=null&&isFinite(v));const W=200,H=48,n=a.length;
  if(n<2)return '<svg viewBox="0 0 '+W+' '+H+'"><text x="6" y="26" font-size="10" fill="#a89e8c">→需补</text></svg>';
  const rf=Number(ind.refline),vals=isFinite(rf)?a.concat([rf]):a;
  const mn=Math.min(...vals),mx=Math.max(...vals),rg=(mx-mn)||1,x=i=>(i/(n-1))*W,y=v=>H-11-((v-mn)/rg)*(H-20);
  let p='';for(let i=0;i<n;i++)p+=(i?'L':'M')+x(i).toFixed(1)+' '+y(a[i]).toFixed(1)+' ';
  /* A1 参考线（现金成本 / 100% / 饱和线）*/
  let ref='';if(isFinite(rf)){const ry=y(rf).toFixed(1);ref='<line x1="0" y1="'+ry+'" x2="'+W+'" y2="'+ry+'" stroke="#c0392b" stroke-width="1" stroke-dasharray="3 3" opacity=".55"/><text x="'+W+'" y="'+(y(rf)-2).toFixed(1)+'" text-anchor="end" font-size="7.5" fill="#c0392b">'+(ind.reflabel||('参考 '+rf))+'</text>';}
  /* A1 拐点（内部极值 = 转向点）*/
  let ai=0,xi=0;for(let i=1;i<n-1;i++){if(a[i]<a[ai])ai=i;if(a[i]>a[xi])xi=i;}
  let ti=-1;if(ai>0&&ai<n-1&&a[ai]<a[0]&&a[ai]<a[n-1])ti=ai;else if(xi>0&&xi<n-1&&a[xi]>a[0]&&a[xi]>a[n-1])ti=xi;
  const turn=ti>=0?'<circle cx="'+x(ti).toFixed(1)+'" cy="'+y(a[ti]).toFixed(1)+'" r="3" fill="#faf8f3" stroke="'+GO+'" stroke-width="2"/>':'';
  /* A1 时间轴端点标 */
  const pr=(ind.periods&&ind.periods.length)?[ind.periods[0],ind.periods[ind.periods.length-1]].join('-'):null;
  const xr=(ind.xrange||pr)?String(ind.xrange||pr).split(/[–\-→~]/):null;
  const xlab=xr&&xr.length>=2?'<text x="0" y="'+(H-1)+'" font-size="7.5" fill="#bcae93">'+xr[0]+'</text><text x="'+W+'" y="'+(H-1)+'" text-anchor="end" font-size="7.5" fill="#bcae93">'+xr[xr.length-1]+'</text>':'';
  return '<svg viewBox="0 0 '+W+' '+H+'">'+ref+'<path d="'+p+'" fill="none" stroke="#cbbfa6" stroke-width="2"/>'+turn+'<circle cx="'+x(n-1).toFixed(1)+'" cy="'+y(a[n-1]).toFixed(1)+'" r="3.6" fill="'+OX+'"/>'+xlab+'</svg>';};
 const DIR={'↑':'#1e7e4f','↓':'#c0392b','→':GO};
 const cells=inds.map(ind=>{const dir=ind.dir||'→';const _arr=(ind.points||ind.series||[]).filter(v=>v!=null&&isFinite(v));const _last=_arr.length?_arr[_arr.length-1]:null;const latest=ind.latest!=null?ind.latest:_last;return `<div class="tr-cell"><div class="tr-nm">${ind.name||''}</div>${spark(ind)}<div class="tr-foot"><span class="tr-val">${latest!=null?latest:'→需补'}${(latest!=null&&ind.unit)?ind.unit:''}</span><span class="tr-dir" style="color:${DIR[dir]||GO}">${dir}</span></div>${ind.note?`<div class="tr-note">${ind.note}</div>`:''}</div>`;}).join('');
 const cc=Object.assign({readhint:'每格一指标：灰线=时序 · 实心点=最新 · 空心点=拐点 · 红虚线=参考/阈值 · 底标起止年'},c);
 el.outerHTML=`<figure class="vizfig">${figHead(cc,'强度指标时序 · 周期证据层')}<div class="tr">${cells}</div>${figFoot(cc)}</figure>`;
}

/* ===== industry 周期证据层②：当前 vs 历史泡沫阈值对标条 ===== */
function renderBenchbar(el,c){
 const rows=(c.items||[]).map(it=>{
  const cur=Number(it.current),dg=Number(it.danger),anl=Number(it.analog),okCur=isFinite(cur);
  const refs=[cur,dg,anl].filter(isFinite),max=refs.length?Math.max.apply(null,refs)*1.18:1;
  const pct=v=>Math.max(0,Math.min(100,(v/max)*100));
  /* A2 方向：up=越高越危险 / down=越低越危险；safe 优先显式给 */
  const dir=it.dir||(isFinite(dg)?(dg>=cur?'up':'down'):'up');
  let safe=it.safe;if(safe==null&&isFinite(dg))safe=(dir==='up')?(cur<dg):(cur>dg);if(safe==null)safe=true;
  const bc=safe?'#1e7e4f':'#c0392b';
  const curTxt=okCur?(cur+(it.unit||'')):'→需补';
  const dirHint=dir==='down'?'↓越低越危险':'↑越高越危险';
  const curBar=okCur?`<div class="bb-fill" style="width:${Math.max(2,pct(cur)).toFixed(1)}%;background:${bc}"></div>`:'';
  const anMark=isFinite(anl)?`<div class="bb-anmark" style="left:${pct(anl).toFixed(1)}%"></div>`:'';
  const thr=isFinite(dg)?`<div class="bb-thr" style="left:${pct(dg).toFixed(1)}%"></div>`:'';
  const refTxt=[isFinite(anl)?`<span class="bb-ref">◆对标 ${anl}${it.unit||''}</span>`:'',isFinite(dg)?`<span class="bb-dg">┊阈值 ${dg}${it.unit||''}</span>`:''].filter(Boolean).join('　');
  return `<div class="bb-row"><div class="bb-nm">${it.name||''}<span class="bb-dir">${dirHint}</span></div><div class="bb-track">${curBar}${anMark}${thr}</div><div class="bb-val"><b style="color:${bc}">${curTxt}</b>${refTxt?`<span class="bb-refline">${refTxt}</span>`:''}</div>${it.note?`<div class="bb-note">▸ ${it.note}</div>`:''}</div>`;
 }).join('');
 const an=c.analog?`<div class="bb-an">对标基准：<b>${c.analog}</b> · 条=当前值（绿安全/红风险）· ◆=历史对标水平 · ┊=危险阈值</div>`:'';
 const cc=Object.assign({readhint:'每行 当前值 vs ◆历史对标 vs ┊危险阈值，看安全边际还剩多少'},c);
 el.outerHTML=`<figure class="vizfig">${figHead(cc,'当前 vs 历史泡沫 · 关键比率对标')}<div class="bb">${an}${rows}</div>${figFoot(cc)}</figure>`;
}

/* ===== V2.7.1 通用解剖渲染原型库 =====================================
   设计：data 驱动 + 可扩展原型 + path 逃生舱，服务任意技术类型（HBM/显卡/光模块/机器人/电池/天线…）。
   ── BOARD_SHELL[shape](BW,BH)：原型外壳，画该原型的示意轮廓+特征（一眼认出，非工程精确）。
   ── PART_GLYPH[shape](px,py,pw,ph,fill,p)：部件图元，画有辨识度的器件符号；fill 一律 = gcol(grade)（色深=卡脖子度）。
   逃生舱：board.path / parts[].path 直接给自定义轮廓 d 值 → 库里没有的物体无需改代码。
   三重缺省回退（零回归）：board.shape 缺→扁平 ab-bg 底板；parts[].shape 缺→rect 图元；parts 缺坐标→只出图例表。*/
const _f1=v=>Number(v).toFixed(1);
/* 原型外壳库：返回外壳 SVG（不含部件）。每个示意级即可。*/
const BOARD_SHELL={
 /* PCB：板轮廓 + 底边金手指齿 + 四角安装孔 + 内缩丝印边框 + 几条示意走线 */
 pcb(W,H){const gn=Math.max(5,Math.round(W/26)),gw=W/(gn*2-1),gy=H-7,r=Math.min(7,Math.round(Math.min(W,H)/10));
  let g='';for(let i=0;i<gn;i++){const gx=i*gw*2;g+=`<rect class="ab-metal" x="${_f1(gx)}" y="${_f1(gy)}" width="${_f1(gw)}" height="7" rx="1"/>`;}
  const m=9,hr=3.4;let holes='';[[m,m],[W-m,m],[m,H-m-7],[W-m,H-m-7]].forEach(p=>holes+=`<circle class="ab-hole" cx="${_f1(p[0])}" cy="${_f1(p[1])}" r="${hr}"/>`);
  let tr='';for(let i=0;i<4;i++){const ty=14+i*((H-30)/3);tr+=`<path class="ab-trace" d="M14 ${_f1(ty)} H${_f1(W*0.4)} V${_f1(ty+9)} H${_f1(W-16)}"/>`;}
  return `<rect class="ab-shell" x="0" y="0" width="${_f1(W)}" height="${_f1(H)}" rx="${r}"/>`
   +`<rect class="ab-edge-d" x="6" y="6" width="${_f1(W-12)}" height="${_f1(H-13)}" rx="${Math.max(2,r-3)}"/>`+tr+g+holes;},
 /* STACK：芯片叠层侧剖面 = 一摞带厚度/分隔缝的水平层 + 左侧贯穿 TSV 竖线（部件另由 section 布局叠放）*/
 stack(W,H){const r=4,n=5;let layers='';for(let i=0;i<n;i++){const ly=6+i*((H-12)/n),lh=(H-12)/n;
   layers+=`<rect class="ab-shell2" x="10" y="${_f1(ly)}" width="${_f1(W-20)}" height="${_f1(lh-1.5)}" rx="1.5"/>`;}
  const tsv=`<line class="ab-tsv" x1="20" y1="6" x2="20" y2="${_f1(H-6)}"/><line class="ab-tsv" x1="${_f1(W-20)}" y1="6" x2="${_f1(W-20)}" y2="${_f1(H-6)}"/>`;
  return `<rect class="ab-shell" x="0" y="0" width="${_f1(W)}" height="${_f1(H)}" rx="${r}"/>${layers}${tsv}`;},
 /* MODULE：金属外壳 + 左侧光口圆 + 法兰螺孔 */
 module(W,H){const r=16;const cy=H/2,pr=Math.min(13,H*0.16);
  let scr='';[[12,12],[W-12,12],[12,H-12],[W-12,H-12]].forEach(p=>scr+=`<circle class="ab-hole" cx="${_f1(p[0])}" cy="${_f1(p[1])}" r="2.6"/>`);
  const port=`<circle class="ab-metal" cx="14" cy="${_f1(cy)}" r="${_f1(pr)}"/><circle class="ab-hole" cx="14" cy="${_f1(cy)}" r="${_f1(pr*0.5)}"/>`;
  return `<rect class="ab-shell" x="0" y="0" width="${_f1(W)}" height="${_f1(H)}" rx="${r}"/>`
   +`<rect class="ab-edge-d" x="7" y="7" width="${_f1(W-14)}" height="${_f1(H-14)}" rx="${r-5}"/>${scr}${port}`;},
 /* MECH：机械件剖面 = 外壳轮廓 + 中心轴/转子示意 + 端盖缝 */
 mech(W,H){const r=10,cx=W/2,cy=H/2,ro=Math.min(W,H)*0.34,ri=ro*0.4;
  return `<rect class="ab-shell" x="0" y="0" width="${_f1(W)}" height="${_f1(H)}" rx="${r}"/>`
   +`<line class="ab-edge" x1="${_f1(W*0.18)}" y1="6" x2="${_f1(W*0.18)}" y2="${_f1(H-6)}"/>`
   +`<circle class="ab-shell2" cx="${_f1(cx)}" cy="${_f1(cy)}" r="${_f1(ro)}"/>`
   +`<circle class="ab-metal" cx="${_f1(cx)}" cy="${_f1(cy)}" r="${_f1(ri)}"/>`
   +`<line class="ab-edge" x1="${_f1(cx)}" y1="${_f1(cy-ro)}" x2="${_f1(cx)}" y2="${_f1(cy+ro)}"/>`;},
 /* DIE：芯片裸晶 floorplan = 外框 + 网格分区底纹 + 内缩 seal-ring */
 die(W,H){const r=3,step=Math.max(18,Math.round(W/8));let grid='';
  for(let gx=step;gx<W;gx+=step)grid+=`<line class="ab-glyph-ln" x1="${_f1(gx)}" y1="4" x2="${_f1(gx)}" y2="${_f1(H-4)}"/>`;
  for(let gy=step;gy<H;gy+=step)grid+=`<line class="ab-glyph-ln" x1="4" y1="${_f1(gy)}" x2="${_f1(W-4)}" y2="${_f1(gy)}"/>`;
  return `<rect class="ab-shell2" x="0" y="0" width="${_f1(W)}" height="${_f1(H)}" rx="${r}"/>`
   +`<rect class="ab-edge" x="5" y="5" width="${_f1(W-10)}" height="${_f1(H-10)}" rx="2"/>${grid}`;}
};
/* 部件图元库：返回部件 SVG（轮廓+内部特征），fill=gcol(grade)。rect=现状兜底。*/
const PART_GLYPH={
 rect(x,y,w,h,fill){return `<rect x="${_f1(x)}" y="${_f1(y)}" width="${_f1(w)}" height="${_f1(h)}" rx="3" fill="${fill}" fill-opacity=".88"/>`;},
 /* chip：黑体 + 四边引脚短线 + pin-1 角点 */
 chip(x,y,w,h,fill){const np=Math.max(2,Math.min(5,Math.round(w/12))),sp=w/(np+1),L=4;let pins='';
  for(let i=1;i<=np;i++){const px=x+sp*i;pins+=`<line class="ab-pin" x1="${_f1(px)}" y1="${_f1(y)}" x2="${_f1(px)}" y2="${_f1(y-L)}"/><line class="ab-pin" x1="${_f1(px)}" y1="${_f1(y+h)}" x2="${_f1(px)}" y2="${_f1(y+h+L)}"/>`;}
  const nv=Math.max(2,Math.min(5,Math.round(h/12))),vp=h/(nv+1);
  for(let i=1;i<=nv;i++){const py=y+vp*i;pins+=`<line class="ab-pin" x1="${_f1(x)}" y1="${_f1(py)}" x2="${_f1(x-L)}" y2="${_f1(py)}"/><line class="ab-pin" x1="${_f1(x+w)}" y1="${_f1(py)}" x2="${_f1(x+w+L)}" y2="${_f1(py)}"/>`;}
  return pins+`<rect x="${_f1(x)}" y="${_f1(y)}" width="${_f1(w)}" height="${_f1(h)}" rx="2" fill="${fill}" fill-opacity=".9"/>`
   +`<circle class="ab-pin1" cx="${_f1(x+4)}" cy="${_f1(y+4)}" r="1.7"/>`;},
 /* die：裸晶 + 对角划片纹 */
 die(x,y,w,h,fill){return `<rect x="${_f1(x)}" y="${_f1(y)}" width="${_f1(w)}" height="${_f1(h)}" rx="1.5" fill="${fill}" fill-opacity=".9"/>`
  +`<line class="ab-glyph-ln" x1="${_f1(x)}" y1="${_f1(y)}" x2="${_f1(x+w)}" y2="${_f1(y+h)}"/><line class="ab-glyph-ln" x1="${_f1(x+w)}" y1="${_f1(y)}" x2="${_f1(x)}" y2="${_f1(y+h)}"/>`;},
 /* connector：金手指齿 / 插针阵列 */
 connector(x,y,w,h,fill){const n=Math.max(3,Math.round(w/7)),fw=w/(n*1.6);let f='';
  for(let i=0;i<n;i++){const fx=x+i*(w/n)+ (w/n-fw)/2;f+=`<rect x="${_f1(fx)}" y="${_f1(y)}" width="${_f1(fw)}" height="${_f1(h)}" rx="1" fill="${fill}" fill-opacity=".92"/>`;}
  return `<rect x="${_f1(x)}" y="${_f1(y)}" width="${_f1(w)}" height="${_f1(h)}" rx="1" fill="none" stroke="${fill}" stroke-width="1" opacity=".5"/>${f}`;},
 /* heatsink：竖鳍片排 */
 heatsink(x,y,w,h,fill){const n=Math.max(3,Math.round(w/6)),fw=w/(n*1.8);let f='';
  for(let i=0;i<n;i++){const fx=x+i*(w/n);f+=`<rect x="${_f1(fx)}" y="${_f1(y)}" width="${_f1(fw)}" height="${_f1(h)}" rx="1" fill="${fill}" fill-opacity=".82"/>`;}
  return f+`<rect x="${_f1(x)}" y="${_f1(y+h-3)}" width="${_f1(w)}" height="3" fill="${fill}" fill-opacity=".95"/>`;},
 /* capacitor：圆柱 + 极性条 */
 capacitor(x,y,w,h,fill){const cx=x+w/2;return `<rect x="${_f1(x)}" y="${_f1(y)}" width="${_f1(w)}" height="${_f1(h)}" rx="${_f1(Math.min(w,h)/2.4)}" fill="${fill}" fill-opacity=".88"/>`
  +`<ellipse cx="${_f1(cx)}" cy="${_f1(y+3)}" rx="${_f1(w/2-1)}" ry="2.2" fill="none" class="ab-glyph-ln"/>`
  +`<rect x="${_f1(x+1.5)}" y="${_f1(y+3)}" width="2.4" height="${_f1(h-6)}" fill="var(--paper2)" opacity=".75"/>`;},
 /* coil：线圈 / 绕组弧线（电机/电感）*/
 coil(x,y,w,h,fill){const cx=x+w/2,cy=y+h/2,n=Math.max(3,Math.round(w/9)),rw=w/(n+1);let arcs='';
  for(let i=0;i<n;i++){const ax=x+rw*(i+0.7);arcs+=`<ellipse cx="${_f1(ax)}" cy="${_f1(cy)}" rx="${_f1(rw*0.55)}" ry="${_f1(h/2-1.5)}" fill="none" stroke="${fill}" stroke-width="1.6" opacity=".82"/>`;}
  return `<rect x="${_f1(x)}" y="${_f1(y)}" width="${_f1(w)}" height="${_f1(h)}" rx="3" fill="${fill}" fill-opacity=".14"/>${arcs}`;},
 /* gear：齿轮（机械）*/
 gear(x,y,w,h,fill){const cx=x+w/2,cy=y+h/2,R=Math.min(w,h)/2-1,nt=10;let teeth='';
  for(let i=0;i<nt;i++){const a=(i/nt)*2*Math.PI,a2=a+Math.PI/nt*0.55;
   teeth+=`<line x1="${_f1(cx+Math.cos(a)*R*0.82)}" y1="${_f1(cy+Math.sin(a)*R*0.82)}" x2="${_f1(cx+Math.cos(a2)*R)}" y2="${_f1(cy+Math.sin(a2)*R)}" stroke="${fill}" stroke-width="2.4" stroke-linecap="round"/>`;}
  return teeth+`<circle cx="${_f1(cx)}" cy="${_f1(cy)}" r="${_f1(R*0.78)}" fill="${fill}" fill-opacity=".88"/><circle cx="${_f1(cx)}" cy="${_f1(cy)}" r="${_f1(R*0.3)}" fill="var(--paper2)"/>`;},
 /* cell：电芯（电池）+ 正极柱 */
 cell(x,y,w,h,fill){return `<rect x="${_f1(x)}" y="${_f1(y)}" width="${_f1(w)}" height="${_f1(h)}" rx="2.5" fill="${fill}" fill-opacity=".88"/>`
  +`<rect x="${_f1(x+w/2-3)}" y="${_f1(y-2.5)}" width="6" height="3" rx="1" fill="${fill}"/>`
  +`<line class="ab-glyph-ln" x1="${_f1(x+3)}" y1="${_f1(y+h/2)}" x2="${_f1(x+w-3)}" y2="${_f1(y+h/2)}"/>`;},
 /* lens：透镜 / 同心圆（光学）*/
 lens(x,y,w,h,fill){const cx=x+w/2,cy=y+h/2,R=Math.min(w,h)/2-1;return `<circle cx="${_f1(cx)}" cy="${_f1(cy)}" r="${_f1(R)}" fill="${fill}" fill-opacity=".5"/>`
  +`<circle cx="${_f1(cx)}" cy="${_f1(cy)}" r="${_f1(R*0.62)}" fill="none" stroke="${fill}" stroke-width="1.4"/><circle cx="${_f1(cx)}" cy="${_f1(cy)}" r="${_f1(R*0.28)}" fill="${fill}" fill-opacity=".95"/>`;},
 /* port：光口同心圆（带法兰）*/
 port(x,y,w,h,fill){const cx=x+w/2,cy=y+h/2,R=Math.min(w,h)/2-1;return `<circle class="ab-metal" cx="${_f1(cx)}" cy="${_f1(cy)}" r="${_f1(R)}"/>`
  +`<circle cx="${_f1(cx)}" cy="${_f1(cy)}" r="${_f1(R*0.55)}" fill="${fill}" fill-opacity=".9"/><circle cx="${_f1(cx)}" cy="${_f1(cy)}" r="${_f1(R*0.22)}" fill="var(--paper2)"/>`;},
 /* stack-layer：带厚度阴影的叠层条（叠层剖面用）*/
 'stack-layer'(x,y,w,h,fill){return `<rect x="${_f1(x)}" y="${_f1(y)}" width="${_f1(w)}" height="${_f1(h)}" rx="1.5" fill="${fill}" fill-opacity=".9"/>`
  +`<rect x="${_f1(x)}" y="${_f1(y+h-2.2)}" width="${_f1(w)}" height="2.2" fill="#000" opacity=".18"/>`
  +`<line class="ab-glyph-ln" x1="${_f1(x)}" y1="${_f1(y+0.8)}" x2="${_f1(x+w)}" y2="${_f1(y+0.8)}"/>`;}
};
/* ===== techdive 实体标注解剖图：编号 callout schematic + 图例表（纯 SVG 编辑卡 + HTML 表）=====
   部件按 grade(1-5) 用 oxblood→faint 渐变着色；ticker 以纯文本输出，复用全局 ticker→Yahoo linkify。
   V2.7.1：升级为通用标注解剖图——BOARD_SHELL 外壳原型 + PART_GLYPH 部件图元 + path 逃生舱 + section 剖面视图 + 外置 leader-line 标注。
   降级（零回归）：board.shape 缺→扁平 ab-bg；parts[].shape 缺→rect；parts 缺 x/y 坐标 → 只渲图例表（诚实不假装）。*/
function renderAnatomy(c){
 const parts=(c.parts||[]);
 const GRADE=['#cbbfa6','#bf9a8c','#b66f5d','#a8483a','#8c2f23']; // grade 1→5: faint → oxblood
 const tint =['rgba(203,195,182,.18)','rgba(191,154,140,.20)','rgba(182,111,93,.22)','rgba(168,72,58,.24)','rgba(140,47,35,.26)'];
 const gcol=g=>{const i=Math.max(1,Math.min(5,Number(g)||1))-1;return GRADE[i];};
 const gtint=g=>{const i=Math.max(1,Math.min(5,Number(g)||1))-1;return tint[i];};
 const stripsec=s=>String(s==null?'':s);
 /* ① 解剖板（SVG）— 仅当 parts 全有 x/y 坐标时绘制 */
 const placed=parts.filter(p=>p&&isFinite(Number(p.x))&&isFinite(Number(p.y)));
 const bd=c.board||{};
 const section=bd.view==='section';
 /* 是否启用任一新特性（外壳原型 / path 逃生舱 / 剖面视图 / 部件图元）——
    ★ 零回归关键：只有显式请求新特性才走富渲染；不带任何新字段的老 anatomy JSON → legacy 分支 → 字节级不变。
    外置 leader 标注不是触发条件：它在富渲染分支内默认开启（labels:false 可关回 on-part 徽标），
    也可对老式 schematic 用 board.labels:true 单独点亮（不改其余渲染）。 */
 const hasShell=!!(bd.shape||bd.path);
 const hasGlyph=placed.some(p=>p.shape||p.path);
 const wantLabel=(bd.labels===true)||((hasShell||hasGlyph||section)&&bd.labels!==false);
 const enrich=hasShell||hasGlyph||section||(bd.labels===true&&placed.length);
 let board='';
 if(placed.length && !enrich){
  /* ── legacy 分支（与 V2.7.0 字节级一致）── */
  const BW=Math.max(160,Number(bd.w)||320),BH=Math.max(110,Number(bd.h)||210);
  const round=(bd.shape==='module')?18:9;
  const cells=placed.map(p=>{
   const w=Math.max(4,Number(p.w)||14),h=Math.max(4,Number(p.h)||12);
   const x=Math.max(0,Math.min(100,Number(p.x))),y=Math.max(0,Math.min(100,Number(p.y)));
   const px=(x/100)*BW,py=(y/100)*BH,pw=(w/100)*BW,ph=(h/100)*BH;
   const cx=px+pw/2,cy=py+ph/2;
   const nm=String(p.name||'').slice(0,8);
   return `<g class="ab-part">`
    +`<rect x="${px.toFixed(1)}" y="${py.toFixed(1)}" width="${pw.toFixed(1)}" height="${ph.toFixed(1)}" rx="3" fill="${gcol(p.grade)}" fill-opacity=".88"/>`
    +`<text class="ab-pname" x="${cx.toFixed(1)}" y="${(cy+13).toFixed(1)}">${nm}</text>`
    +`<circle class="ab-badge" cx="${cx.toFixed(1)}" cy="${(cy-3).toFixed(1)}" r="8.5"/>`
    +`<text class="ab-bnum" x="${cx.toFixed(1)}" y="${(cy+0.5).toFixed(1)}">${p.n!=null?p.n:''}</text>`
    +`</g>`;
  }).join('');
  board=`<svg class="anat-board" viewBox="-6 -6 ${BW+12} ${BH+12}" role="img">`
   +`<rect class="ab-bg" x="0" y="0" width="${BW}" height="${BH}" rx="${round}"/>${cells}</svg>`;
 }else if(placed.length){
  /* ── V2.7.1 通用富渲染分支 ── */
  const BW=Math.max(160,Number(bd.w)||320),BH=Math.max(110,Number(bd.h)||210);
  /* 剖面视图：按 parts 顺序把每个 part 自动堆叠成上下层（覆盖其 x/h，保留 grade/n/name）*/
  const ABS=!section && placed.some(p=>[p.x,p.y,p.w,p.h].some(v=>Number(v)>100)); /* 坐标制式自动识别：非剖面下任一坐标>100=绝对(板内 px)，否则百分比 0-100；剖面恒按比例堆叠。作者两种写法都对 */
  const lay=placed.map((p,i)=>{
   let x=ABS?Number(p.x):Math.max(0,Math.min(100,Number(p.x))),y=ABS?Number(p.y):Math.max(0,Math.min(100,Number(p.y)));
   let w=Math.max(4,Number(p.w)||14),h=Math.max(4,Number(p.h)||12);
   if(section){const n=placed.length,gap=2,lh=(100-gap*(n+1))/n;x=8;w=84;h=lh;y=gap+(lh+gap)*i;}
   const px=ABS?x:(x/100)*BW,py=ABS?y:(y/100)*BH,pw=ABS?w:(w/100)*BW,ph=ABS?h:(h/100)*BH;
   return {p,px,py,pw,ph,cx:px+pw/2,cy:py+ph/2};
  });
  /* 外壳：path 逃生舱 > shape 查库 > section 默认 stack > 缺省扁平 ab-bg */
  let shell;
  if(bd.path) shell=`<path class="ab-shell" d="${bd.path}"/>`;
  else if(bd.shape&&BOARD_SHELL[bd.shape]) shell=BOARD_SHELL[bd.shape](BW,BH);
  else if(section) shell=BOARD_SHELL.stack(BW,BH);
  else shell=`<rect class="ab-bg" x="0" y="0" width="${_f1(BW)}" height="${_f1(BH)}" rx="9"/>`;
  /* 部件图元：parts[].path 逃生舱 > parts[].shape 查库 > section 默认 stack-layer > rect 兜底 */
  const glyphs=lay.map(L=>{const p=L.p,fill=gcol(p.grade);
   let g;
   if(p.path) g=`<path d="${p.path}" fill="${fill}" fill-opacity=".9"/>`;
   else{const fn=PART_GLYPH[p.shape]||(section?PART_GLYPH['stack-layer']:PART_GLYPH.rect);g=fn(L.px,L.py,L.pw,L.ph,fill,p);}
   const nm=String(p.name||'').slice(0,9);
   return `<g class="ab-part">${g}<text class="ab-pname" x="${_f1(L.cx)}" y="${_f1(L.cy+3)}">${nm}</text></g>`;
  }).join('');
  /* 外置 leader-line 标注：徽标放左/右边距 + 0.5px 虚线牵到部件；空间窄/labels:false → 回退 on-part 徽标 */
  const M=wantLabel?64:0;  /* 左右各留 64px 标签边距 */
  const lefts=[],rights=[];
  if(wantLabel){
   /* 按部件中心在左半/右半分组，组内按 y 排序，纵向均分边距槽位 */
   lay.forEach(L=>{(L.cx<BW/2?lefts:rights).push(L);});
   lefts.sort((a,b)=>a.cy-b.cy);rights.sort((a,b)=>a.cy-b.cy);
  }
  const slot=(arr,side)=>arr.map((L,i)=>{
   const n=arr.length,sy=(BH/(n+1))*(i+1);
   const bx=side==='L'?-M+14:BW+M-14,tx=side==='L'?-M+30:BW+M-30;
   const p=L.p;
   return `<line class="ab-lead" x1="${_f1(L.cx)}" y1="${_f1(L.cy)}" x2="${_f1(bx+(side==='L'?9:-9))}" y2="${_f1(sy)}"/>`
    +`<circle class="ab-badge" cx="${_f1(bx)}" cy="${_f1(sy)}" r="8.5"/>`
    +`<text class="ab-bnum" x="${_f1(bx)}" y="${_f1(sy+0.5)}">${p.n!=null?p.n:''}</text>`;
  }).join('');
  let badges;
  if(wantLabel){badges=slot(lefts,'L')+slot(rights,'R');}
  else{ /* on-part 徽标回退 */
   badges=lay.map(L=>`<circle class="ab-badge" cx="${_f1(L.cx)}" cy="${_f1(L.py+9)}" r="8.5"/><text class="ab-bnum" x="${_f1(L.cx)}" y="${_f1(L.py+12.5)}">${L.p.n!=null?L.p.n:''}</text>`).join('');
  }
  const vbX=-6-M,vbW=BW+12+M*2;
  board=`<svg class="anat-board" viewBox="${_f1(vbX)} -6 ${_f1(vbW)} ${BH+12}" role="img">${shell}${glyphs}${badges}</svg>`;
 }
 /* ★ V2.7.3 真图标注模式（image-mode）：有 `image.url`（websearch 真实权威配图：厂商/数据手册/论文图）时，
    用真图 + 编号 callout 覆盖层替代合成 SVG——治"合成解剖图画不像真物"（如 GB200 托盘、具体封装/连接器）。
    callouts[].n/x/y（x/y=0-100% 覆盖在图上），与下方图例表 # 一一对应；带来源出处归属、零回归（无 image 走原合成分支）。*/
 let imgMode=false;
 if(c.image && c.image.url){imgMode=true;
  const im=c.image;
  const cos=(im.callouts||[]).map(o=>`<span class="anat-co" style="left:${Math.max(0,Math.min(100,Number(o.x)||0))}%;top:${Math.max(0,Math.min(100,Number(o.y)||0))}%">${o.n!=null?o.n:''}</span>`).join('');
  const srcName=im.source||im.source_url||'';
  const src=srcName?`<div class="anat-imgsrc">图源：${im.source_url?`<a href="${im.source_url}" target="_blank" rel="noopener">${srcName}</a>`:srcName}${im.caption?(' · '+im.caption):''}</div>`:`<div class="anat-imgsrc">⚠ 图源→需补</div>`;
  board=`<div class="anat-img"><img src="${im.url}" alt="${String(c.cap||'解剖图').replace(/"/g,'')}" loading="lazy">${cos}</div>${src}`;
 }
 /* ② 图例表（HTML）— 始终渲染（板缺坐标时这是唯一输出）*/
 const rows=parts.map(p=>{
  const rel=p.rel&&p.rel!=='confirmed'?`<span style="color:#999;font-size:.85em">（${p.rel==='candidate'?'送样/未确认':'仅具能力'}）</span>`:'';
  const co=stripsec(p.co)+rel, sec=p.sec?`<span class="sec">${p.sec}</span>`:'';
  const gr=isFinite(Number(p.grade))?`<span class="gr">${stars(Number(p.grade))}</span>`:'';
  const link=p.link?p.link:'<span class="lg-dash">—</span>';
  return `<tr style="background:${gtint(p.grade)}">`
   +`<td class="lg-n">${p.n!=null?p.n:''}</td>`
   +`<td class="lg-nm">${p.name||''}${gr}</td>`
   +`<td>${p.fn||'<span class="lg-dash">→需补</span>'}</td>`
   +`<td>${link}</td>`
   +`<td class="lg-co">${co||'<span class="lg-dash">—</span>'}${sec}</td></tr>`;
 }).join('');
 const tbl=`<table class="anat-leg"><thead><tr><th>#</th><th>部件</th><th>功能</th><th>连接</th><th>公司</th></tr></thead><tbody>${rows}</tbody></table>`;
 const note=c.legendnote?`<div class="anat-note">▸ ${c.legendnote}</div>`:'';
 const cc=Object.assign({readhint:'板上编号徽标（外侧 ↔ 0.5px 虚线引线牵到部件）与下表 # 一一对应；色深=越卡脖子（grade 5→1：oxblood→faint）'+(placed.length?'':' · ⚠ 部件缺坐标，已降级为纯图例表')},c);
 return `<figure class="vizfig">${figHead(cc,'实体标注解剖图')}<div class="anat">${board}${tbl}${note}</div>${figFoot(cc)}</figure>`;
}

/* ===== 全文 markdown 渲染（零删减）===== */
const md=window.markdownit({html:true,linkify:false,breaks:false});
document.getElementById('content').innerHTML=md.render(document.getElementById('md').textContent);
document.querySelectorAll('#content h1,#content h2,#content h3').forEach(h=>{h.id=h.textContent.replace(/[\s、：·（）()\[\]/.,#]/g,'')});
/* 表格包横向滚动容器（防溢出/竖排）*/
document.querySelectorAll('#content table').forEach(t=>{const w=document.createElement('div');w.className='tablewrap';t.parentNode.insertBefore(w,t);w.appendChild(t);});
/* mermaid 复活 */
document.querySelectorAll('#content code.language-mermaid').forEach(el=>{const d=document.createElement('div');d.className='mermaid';d.textContent=el.textContent;el.closest('pre').replaceWith(d);});
if(typeof mermaid!=='undefined'){try{mermaid.initialize({startOnLoad:false,theme:'base',themeVariables:{fontFamily:'PingFang SC,sans-serif',fontSize:'13px'},flowchart:{nodeSpacing:28,rankSpacing:32,useMaxWidth:true}});mermaid.run({querySelector:'#content .mermaid'});}catch(e){}}
/* ASCII <pre> → 渲染图。优先读紧邻前的 <!--VIZ:KEY--> 标记（稳健，V2.5.2+）；
   无标记则回退关键词 sentinel（兼容老报告） */
function vizKey(pre){let n=pre.previousSibling,hop=0;while(n&&hop<4){if(n.nodeType===8){const m=/VIZ:(\w+)/.exec(n.nodeValue);if(m)return m[1];}if(n.nodeType===1)break;n=n.previousSibling;hop++;}return null;}
function kwKey(t){if(t.includes('产业链全景'))return'chain';if(t.includes('资金流总览')||t.includes('价值传导'))return'valueflow';if(t.includes('世界分布'))return'geo';if(t.includes('不可或缺'))return'bubble';if(t.includes('Embryonic')&&t.includes('卡脖子'))return'lifecycle';return null;}
let _vid=0;
document.querySelectorAll('#content pre').forEach(pre=>{try{
 const key=vizKey(pre)||kwKey(pre.textContent);
 if(!key) return;
 const base=key.split('_')[0], xdata=CH[key];
 if(key==='chain' && CH.chain){const w=document.createElement('div');w.innerHTML=buildChain(CH.chain);pre.replaceWith(w.firstChild);return;}
 if(key==='valueflow' && CH.valueflow){const w=document.createElement('div');w.innerHTML=buildValueflow(CH.valueflow);pre.replaceWith(w.firstChild);return;}
 if(key==='anatomy' && CH.anatomy){const w=document.createElement('div');w.innerHTML=renderAnatomy(CH.anatomy);pre.replaceWith(w.firstChild);return;}
 if(key==='geo' && CH.geo){pre.id='geo_'+(++_vid);renderGeo(pre,CH.geo);return;}
 if(key==='bubble' && CH.bubble){pre.id='bub_'+(++_vid);renderBubble(pre,CH.bubble);return;}
 if(key==='lifecycle' && CH.lifecycle){pre.id='lc_'+(++_vid);renderLifecycle(pre,CH.lifecycle);return;}
 if(base==='timeline' && xdata){pre.id='v_'+(++_vid);renderTimeline(pre,xdata);return;}
 if(base==='scorecard' && xdata){pre.id='v_'+(++_vid);renderScorecard(pre,xdata);return;}
 if(base==='gauge' && xdata){pre.id='v_'+(++_vid);renderGauge(pre,xdata);return;}
 if(base==='network' && xdata){pre.id='v_'+(++_vid);renderNetwork(pre,xdata);return;}
 if(base==='cycle' && xdata){pre.id='v_'+(++_vid);renderCycle(pre,xdata);return;}
 if(base==='trend' && xdata){pre.id='v_'+(++_vid);renderTrend(pre,xdata);return;}
 if(base==='benchbar' && xdata){pre.id='v_'+(++_vid);renderBenchbar(pre,xdata);return;}
}catch(_e){console.warn('viz 渲染跳过（单图异常，不影响其它）:',_e);}});
/* A线增强：标记后无 <pre> 时，图直接插在 <!--VIZ:KEY--> 标记处（正文表格保留作零删减详情）*/
(function(){
 const R={geo:renderGeo,bubble:renderBubble,lifecycle:renderLifecycle,timeline:renderTimeline,scorecard:renderScorecard,gauge:renderGauge,network:renderNetwork,cycle:renderCycle,trend:renderTrend,benchbar:renderBenchbar};
 const cw=document.createTreeWalker(document.getElementById('content'),NodeFilter.SHOW_COMMENT);
 const nodes=[];let n;while(n=cw.nextNode())nodes.push(n);
 nodes.forEach(node=>{try{
  const m=/VIZ:(\w+)/.exec(node.nodeValue);if(!m)return;
  const key=m[1],base=key.split('_')[0],data=CH[key];if(!data)return;
  const nx=node.nextElementSibling;
  if(nx&&nx.classList&&nx.classList.contains('vizfig'))return; // pre-loop 已渲染，跳过
  const ph=document.createElement('div');ph.id='vp_'+(++_vid);node.parentNode.insertBefore(ph,node.nextSibling);
  if(base==='chain'){const w=document.createElement('div');w.innerHTML=buildChain(data);ph.replaceWith(w.firstChild);}
  else if(base==='valueflow'){const w=document.createElement('div');w.innerHTML=buildValueflow(data);ph.replaceWith(w.firstChild);}
  else if(base==='anatomy'){const w=document.createElement('div');w.innerHTML=renderAnatomy(data);ph.replaceWith(w.firstChild);}
  else if(R[base]) R[base](ph,data);
  else ph.remove();
 }catch(_e){console.warn('viz2 渲染跳过:',_e);}});
})();
/* ticker → Yahoo Finance 超链接（点 ticker 跳转）*/
try{(function(){
 const keys=Object.keys(TK).sort((a,b)=>b.length-a.length);
 if(!keys.length) return;
 const esc=s=>s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
 const re=new RegExp('(?<![A-Za-z0-9.$])('+keys.map(esc).join('|')+')(?![A-Za-z0-9])','g');
 const SKIP={A:1,SCRIPT:1,STYLE:1,CODE:1,PRE:1};  /* 不在已有链接 / 代码块 / ASCII pre 内 linkify */
 const walk=document.createTreeWalker(document.getElementById('content'),NodeFilter.SHOW_TEXT,{acceptNode:n=>{
   if(SKIP[n.parentNode.nodeName]) return NodeFilter.FILTER_REJECT;
   return re.test(n.nodeValue)?NodeFilter.FILTER_ACCEPT:NodeFilter.FILTER_SKIP;
 }});
 const todo=[];let n;while(n=walk.nextNode())todo.push(n);
 todo.forEach(node=>{
  re.lastIndex=0;
  const frag=document.createDocumentFragment();let last=0,m;
  while(m=re.exec(node.nodeValue)){
   if(m.index>last)frag.appendChild(document.createTextNode(node.nodeValue.slice(last,m.index)));
   const a=document.createElement('a');a.className='tk-link';a.href=TK[m[1]];a.target='_blank';a.rel='noopener';a.textContent=m[1];
   frag.appendChild(a);last=m.index+m[1].length;
  }
  if(last<node.nodeValue.length)frag.appendChild(document.createTextNode(node.nodeValue.slice(last)));
  node.parentNode.replaceChild(frag,node);
 });
})();}catch(e){/* 老浏览器无 lookbehind 时静默跳过 ticker linkify，不影响其他渲染 */}
/* V2.7.2 ECharts 0 宽自愈（治本 CPO/关节模组 geo·bubble·dashboard 反复空白）：
   脚本在布局完成前同步执行 echarts.init() → 容器此刻 clientWidth=0 → canvas 锁死 0 宽且 ECharts 不自动重画。
   SVG 图（cycle/trend/benchbar）与 DOM 图（chain/valueflow）天生免疫，故只有 canvas 三件反复受害。
   修复三重保险：load 后统一 resize + 字体就绪后 resize + 两级延迟重试（CDN/字体慢场景）+ 保留原 resize 监听。*/
(function(){
 function healAll(){document.querySelectorAll('.chart,.vchart,[id^=d_]').forEach(c=>{try{const i=echarts.getInstanceByDom(c);if(i&&c.clientWidth>0)i.resize();}catch(_e){}});}
 window.addEventListener('load',()=>{healAll();setTimeout(healAll,400);setTimeout(healAll,1500);});
 if(document.fonts&&document.fonts.ready)document.fonts.ready.then(()=>setTimeout(healAll,60));
 if(document.readyState==='complete')setTimeout(healAll,0);
 window.addEventListener('resize',healAll);
})();
